<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformación Actinver 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0A0E12;
  --bg-mid:#0F1620;
  --bg-card:#141C2A;
  --bg-card-light:#1B2536;
  --azul:#314566;
  --azul-light:#3d5580;
  --line:rgba(255,255,255,0.07);
  --line-strong:rgba(255,255,255,0.13);
  --sunset:#E6C78A;
  --sunset-dim:#8C7848;
  --text-pri:#FFFFFF;
  --text-sec:rgba(255,255,255,0.62);
  --text-mut:rgba(255,255,255,0.35);
  --good:#5EE6A0;
  --bad:#FF8B8B;
  --warn:#FFC85C;
  --good-bg:rgba(94,230,160,0.10);
  --bad-bg:rgba(255,139,139,0.10);
  --warn-bg:rgba(255,200,92,0.10);
}
html,body{
  background:var(--bg-deep);
  color:var(--text-pri);
  font-family:'Open Sans',sans-serif;
  min-height:100vh;
  font-size:13px;
  line-height:1.5;
  background-image:
    radial-gradient(ellipse 90% 50% at 50% 0%,rgba(49,69,102,0.20),transparent 65%),
    radial-gradient(ellipse 50% 70% at 95% 100%,rgba(49,69,102,0.10),transparent 60%);
  background-attachment:fixed;
}

/* LAYOUT */
.shell{max-width:1380px;margin:0 auto;padding:24px 28px 60px}
@media(max-width:768px){.shell{padding:16px 14px 50px}}

/* HEADER */
.header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--line-strong);
  flex-wrap:wrap;gap:14px;
}
.header-left{}
.title-eye{
  font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;
  color:var(--text-mut);letter-spacing:3.5px;text-transform:uppercase;margin-bottom:6px;
}
.title-main{
  font-family:'Poppins',sans-serif;font-size:28px;font-weight:300;
  color:var(--text-pri);letter-spacing:.5px;line-height:1.1;
}
.title-main b{font-weight:700}
.title-main .acc{color:var(--sunset)}
.header-logo{height:36px;width:auto;opacity:.95;flex-shrink:0}
@media(max-width:480px){.title-main{font-size:22px}.header-logo{height:28px}}

/* CONTROLS BAR */
.controls{
  display:flex;gap:12px;align-items:center;flex-wrap:wrap;
  background:var(--bg-card);border:1px solid var(--line);border-radius:4px;
  padding:12px 16px;margin-bottom:22px;
}
.ctrl-lbl{
  font-size:9px;font-weight:600;font-family:'Poppins',sans-serif;
  color:var(--text-mut);text-transform:uppercase;letter-spacing:2.5px;
}
.tog{display:flex;gap:0;background:var(--bg-deep);border:1px solid var(--line);border-radius:3px;padding:2px}
.tog-btn{
  padding:6px 14px;font-size:10px;font-family:'Poppins',sans-serif;font-weight:600;
  color:var(--text-mut);cursor:pointer;border-radius:2px;border:none;background:transparent;
  letter-spacing:1.5px;text-transform:uppercase;transition:all .18s;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.tog-btn.on{background:var(--sunset);color:#0A0E12}
.tog-btn:hover:not(.on){color:var(--text-pri)}
.period-badge{
  margin-left:auto;font-size:9px;font-family:'JetBrains Mono',monospace;
  color:var(--text-mut);letter-spacing:1px;
}

/* CATEGORY TABS */
.cat-tabs{
  display:flex;gap:4px;margin-bottom:22px;flex-wrap:wrap;
}
.cat-tab{
  padding:8px 16px;font-size:10.5px;font-family:'Poppins',sans-serif;font-weight:600;
  color:var(--text-mut);cursor:pointer;border:1px solid var(--line);border-radius:3px;
  background:var(--bg-card);transition:all .18s;letter-spacing:1px;text-transform:uppercase;
  white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.cat-tab:hover{color:var(--text-sec);border-color:var(--line-strong)}
.cat-tab.on{color:var(--sunset);border-color:var(--sunset);background:rgba(230,199,138,0.06)}
@media(max-width:600px){.cat-tab{font-size:9.5px;padding:7px 11px}}

/* CATEGORY PANEL */
.cat-panel{display:none}
.cat-panel.on{display:block}

.cat-header{
  display:flex;align-items:baseline;gap:12px;
  margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--line);
}
.cat-title{
  font-family:'Poppins',sans-serif;font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:3px;color:var(--text-pri);
}
.cat-count{
  font-size:9px;font-family:'JetBrains Mono',monospace;
  color:var(--text-mut);letter-spacing:1px;
}

/* INITIATIVE CARDS GRID */
.init-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:14px;
}
@media(max-width:480px){.init-grid{grid-template-columns:1fr}}

/* INITIATIVE CARD */
.init-card{
  background:var(--bg-card);border:1px solid var(--line);border-radius:4px;
  cursor:pointer;transition:border-color .18s,background .18s;overflow:hidden;
  position:relative;
}
.init-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--sunset) 0%,transparent 60%);
  opacity:0;transition:opacity .18s;
}
.init-card:hover{border-color:var(--line-strong);background:var(--bg-card-light)}
.init-card:hover::before,.init-card.open::before{opacity:1}
.init-card.open{border-color:rgba(230,199,138,0.25)}

.card-header{
  width:100%;text-align:left;border:none;background:transparent;color:inherit;
  padding:16px 16px 12px;display:flex;align-items:flex-start;gap:10px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  touch-action:manipulation;user-select:none;-webkit-user-select:none;
}
.card-tag{
  font-size:8px;font-family:'Poppins',sans-serif;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--sunset);
  background:rgba(230,199,138,0.08);border:1px solid rgba(230,199,138,0.15);
  padding:2px 7px;border-radius:2px;white-space:nowrap;flex-shrink:0;margin-top:2px;
}
.card-title{
  font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;
  color:var(--text-pri);line-height:1.25;flex:1;
}
.card-chevron{
  font-size:10px;color:var(--text-mut);transition:transform .2s;margin-left:auto;flex-shrink:0;padding-top:2px;
}
.init-card.open .card-chevron{transform:rotate(180deg)}

/* KPI SUMMARY IN CARD */
.card-kpis{padding:0 16px 14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px}
.ckpi{border-left:1px solid var(--line);padding:4px 0 4px 10px}
.ckpi-lbl{
  font-size:8.5px;font-family:'Poppins',sans-serif;font-weight:600;
  color:var(--text-mut);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;line-height:1.3;
}
.ckpi-val{
  font-size:20px;font-family:'Poppins',sans-serif;font-weight:300;
  color:var(--text-pri);line-height:1;letter-spacing:-.5px;
}
.ckpi-val.hi{color:var(--sunset)}
.ckpi-delta{
  display:inline-flex;align-items:center;gap:3px;font-size:10px;
  font-family:'JetBrains Mono',monospace;font-weight:600;
  padding:2px 6px;border-radius:2px;margin-top:5px;
}
.ckpi-delta.up{background:var(--good-bg);color:var(--good)}
.ckpi-delta.dn{background:var(--bad-bg);color:var(--bad)}
.ckpi-delta.fl{background:rgba(255,255,255,0.04);color:var(--text-mut)}

/* META PROGRESS */
.ckpi-meta{margin-top:5px}
.meta-bar-wrap{height:3px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:3px}
.meta-bar{height:3px;border-radius:2px;background:var(--good);transition:width .4s}
.meta-bar.warn{background:var(--warn)}
.meta-bar.bad{background:var(--bad)}
.meta-txt{font-size:8.5px;color:var(--text-mut);font-family:'JetBrains Mono',monospace;margin-top:3px}

/* DETAIL PANEL */
.card-detail{
  display:none !important;border-top:1px solid var(--line);padding:16px;
}
.init-card.open .card-detail{display:block !important;animation:slideDown .18s ease;}
@keyframes slideDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.detail-chart-wrap{position:relative;height:160px;margin-bottom:14px}
.detail-period-lbl{
  font-size:9px;color:var(--text-mut);font-family:'Poppins',sans-serif;
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;
}

.placeholder-tag{
  display:inline-block;font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;color:var(--warn);
  background:var(--warn-bg);border:1px solid rgba(255,200,92,.2);
  padding:3px 10px;border-radius:2px;margin-top:4px;
}
</style>
</head>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let period = 'sem';
const charts = {};

function setPeriod(p){
  period = p;
  document.getElementById('btnSem').classList.toggle('on', p==='sem');
  document.getElementById('btnMes').classList.toggle('on', p==='mes');
  document.getElementById('periodBadge').textContent =
    p==='sem' ? 'Últimas 6 semanas · datos ilustrativos' : 'Últimos 6 meses · datos ilustrativos';
  refreshAllCharts();
}

function setCat(id){
  document.querySelectorAll('.cat-tab').forEach((t,i)=>{
    const ids=['clientes','captacion','vinculacion','transaccional','lab'];
    t.classList.toggle('on', ids[i]===id);
  });
  document.querySelectorAll('.cat-panel').forEach(p=>{
    p.classList.toggle('on', p.id==='cat-'+id);
  });
  // Re-render charts in newly shown panels (they may have been rendered while hidden)
  setTimeout(()=>refreshAllCharts(),50);
}

// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────

// Helper: generate a trend array of n values around a base, with slight growth
function trend(base, n, volatility, growth){
  let v=base, arr=[];
  for(let i=0;i<n;i++){
    v = v*(1+growth) + (Math.random()-0.45)*volatility*base;
    arr.push(Math.round(v*100)/100);
  }
  return arr;
}

const SEM_LABELS = ['S1','S2','S3','S4','S5','S6'];
const MES_LABELS = ['Nov','Dic','Ene','Feb','Mar','Abr'];

function genSeries(base, vol, growth, n=6){
  return trend(base, n, vol, growth);
}

// Each initiative: { id, title, tag, cat, periodicidad, placeholder?, kpis[], chartKpi }
// kpi: { label, sem[], mes[], meta, unit, fmt }

const INITIATIVES = [

  // ── CLIENTES ──────────────────────────────
  {
    id:'granfiltro', title:'Gran Filtro', tag:'Adquisición', cat:'clientes',
    periodicidad:'sem',
    kpis:[
      { label:'SQLs generados', sem:genSeries(380,0.12,0.06), mes:genSeries(1500,0.1,0.05), meta:500, unit:'', fmt:n=>Math.round(n).toLocaleString('es-MX') },
      { label:'Conversión SQL→cliente', sem:genSeries(11,0.15,0.03), mes:genSeries(12,0.12,0.02), meta:15, unit:'%', fmt:n=>n.toFixed(1)+'%' },
      { label:'AUM promedio nuevo', sem:genSeries(290,0.08,0.04), mes:genSeries(300,0.07,0.03), meta:350, unit:'K', fmt:n=>'$'+Math.round(n)+'K' },
    ]
  },
  {
    id:'onboarding', title:'Onboarding Digital', tag:'Adquisición', cat:'clientes',
    periodicidad:'sem',
    kpis:[
      { label:'Conversión apertura', sem:genSeries(52,0.1,0.025), mes:genSeries(54,0.08,0.02), meta:60, unit:'%', fmt:n=>n.toFixed(1)+'%' },
      { label:'Conversión fondeo', sem:genSeries(61,0.09,0.02), mes:genSeries(63,0.07,0.015), meta:70, unit:'%', fmt:n=>n.toFixed(1)+'%' },
      { label:'Saldo prom. cliente nuevo', sem:genSeries(145,0.1,0.04), mes:genSeries(150,0.08,0.035), meta:180, unit:'K', fmt:n=>'$'+Math.round(n)+'K' },
    ]
  },
  {
    id:'ovirtual', title:'Oficina Virtual', tag:'Atención', cat:'clientes',

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────

function metaPct(val, meta){
  if(!meta) return null;
  return Math.min(Math.round((val/meta)*100),100);
}
function metaColor(pct){
  if(pct>=85) return 'good';
  if(pct>=60) return 'warn';
  return 'bad';
}
function delta(arr){
  const prev=arr[arr.length-2], cur=arr[arr.length-1];
  if(!prev||prev===0) return {pct:0,cls:'fl'};
  const p=((cur-prev)/Math.abs(prev))*100;
  return {pct:p, cls:p>1?'up':p<-1?'dn':'fl', str:(p>=0?'+':'')+p.toFixed(1)+'%'};
}

function buildCard(init){
  const el = document.createElement('div');
  el.className='init-card';
  el.id='card-'+init.id;

  // Determine display data based on period preference
  const arr = (period==='sem'||init.periodicidad==='sem') ? init.kpis[0].sem : init.kpis[0].mes;
  const lastVal = arr[arr.length-1];

  // Build KPI summary HTML
  let kpiHtml = '';
  init.kpis.forEach((k,i)=>{
    const src = (period==='sem') ? k.sem : k.mes;
    const val = src[src.length-1];
    const d = delta(src);
    const pct = metaPct(val, k.meta);
    const mc = pct!==null ? metaColor(pct) : null;

    kpiHtml += `<div class="ckpi">
      <div class="ckpi-lbl">${k.label}</div>
      <div class="ckpi-val${i===0?' hi':''}">${k.fmt(val)}</div>
      <div class="ckpi-delta ${d.cls}">
        <span>${d.cls==='up'?'▲':d.cls==='dn'?'▼':'—'}</span> ${d.str||'Sin cambio'}
      </div>
      ${pct!==null?`<div class="ckpi-meta">
        <div class="meta-txt">Meta: ${k.fmt(k.meta)} · ${pct}%</div>
        <div class="meta-bar-wrap"><div class="meta-bar ${mc}" style="width:${pct}%"></div></div>
      </div>`:''}
    </div>`;
  });

  const placeholderTag = init.placeholder
    ? `<div style="padding:0 16px 10px"><span class="placeholder-tag">KPIs en definición</span></div>` : '';

  el.innerHTML = `
    <button class="card-header" onclick="toggleCard('${init.id}')" type="button">
      <span class="card-tag">${init.tag}</span>
      <span class="card-title">${init.title}</span>
      <span class="card-chevron">▼</span>
    </button>
    <div class="card-kpis">${kpiHtml}</div>
    ${placeholderTag}
    <div class="card-detail">
      <div class="detail-period-lbl">Tendencia · ${period==='sem'?'últimas 6 semanas':'últimos 6 meses'}</div>
      <div class="detail-chart-wrap">
        <canvas id="chart-${init.id}"></canvas>
      </div>
    </div>`;

  return el;
}

function toggleCard(initId){
  const el = document.getElementById('card-'+initId);
  if(!el) return;
  const init = INITIATIVES.find(i=>i.id===initId);
  if(!init) return;
  const wasOpen = el.classList.contains('open');
  // Close all open cards in same grid
  el.closest('.init-grid').querySelectorAll('.init-card.open').forEach(c=>{
    c.classList.remove('open');
    const cid = c.id.replace('card-','');
    if(charts[cid]){charts[cid].destroy();delete charts[cid];}
  });
  if(!wasOpen){
    el.classList.add('open');
    setTimeout(()=>renderChart(init),30);
  }
}

function renderChart(init){
  const cid = init.id;
  if(charts[cid]) charts[cid].destroy();
  const ctx = document.getElementById('chart-'+cid);
  if(!ctx) return;

  const labels = period==='sem' ? SEM_LABELS : MES_LABELS;
  const colors = ['#E6C78A','#5EE6A0','#FF8B8B','#7B9FD4'];

  const datasets = init.kpis.map((k,i)=>({
    label: k.label,
    data: (period==='sem'?k.sem:k.mes),
    borderColor: colors[i]||colors[0],
    backgroundColor: (colors[i]||colors[0])+'18',
    borderWidth: i===0?2:1.5,
    pointRadius: 3,
    pointHoverRadius: 6,
    pointBackgroundColor: colors[i]||colors[0],
    pointBorderColor: '#0A0E12',
    pointBorderWidth: 2,
    fill: i===0,
    tension: 0.35,
  }));

  // Add meta line for primary KPI
  const primaryMeta = init.kpis[0].meta;
  if(primaryMeta){
    datasets.push({
      label:'Meta',
      data: Array(6).fill(primaryMeta),
      borderColor: 'rgba(255,255,255,0.18)',
      borderWidth: 1,
      borderDash:[4,4],
      pointRadius:0,
      fill:false,
      tension:0,
    });
  }

  charts[cid] = new Chart(ctx,{
    type:'line',
    data:{labels, datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          display: init.kpis.length>1,
          position:'bottom',
          labels:{color:'rgba(255,255,255,0.45)',font:{size:10,family:'Open Sans'},padding:14,boxWidth:10}
        },
        tooltip:{
          backgroundColor:'#0A0E12',borderColor:'#314566',borderWidth:1,
          titleColor:'#fff',bodyColor:'rgba(255,255,255,0.65)',padding:10,
          callbacks:{label:ctx=>`  ${ctx.dataset.label}: ${init.kpis[ctx.datasetIndex]?.fmt ? init.kpis[ctx.datasetIndex].fmt(ctx.parsed.y) : ctx.parsed.y}`}
        }
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(255,255,255,0.35)',font:{size:10}},border:{color:'transparent'}},
        y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'rgba(255,255,255,0.35)',font:{size:10}},border:{color:'transparent'}}
      }
    }
  });
}

function refreshAllCharts(){
  Object.keys(charts).forEach(cid=>{
    if(charts[cid]){charts[cid].destroy();delete charts[cid];}
  });
  INITIATIVES.forEach(init=>{
    const el = document.getElementById('card-'+init.id);
    if(!el) return;
    const wasOpen = el.classList.contains('open');
    const grid = el.parentElement;
    const newEl = buildCard(init);
    if(wasOpen) newEl.classList.add('open');
    grid.replaceChild(newEl, el);
    if(wasOpen) setTimeout(()=>renderChart(init),30);
  });
}

function mountAll(){
  const cats={clientes:[],captacion:[],vinculacion:[],transaccional:[],lab:[]};
  INITIATIVES.forEach(i=>cats[i.cat].push(i));
  Object.entries(cats).forEach(([cat,list])=>{
    const grid=document.getElementById('grid-'+cat);
    if(!grid) return;
    list.forEach(init=>{
      const card=buildCard(init);
      grid.appendChild(card);
    });
  });
}

mountAll();
