// ==================== VISTA SEMANAL ====================
function getSemanas(){
  // Siempre compara semanas completas: anterior vs antepasada
  const today = new Date();
  const dow = today.getDay(); // 0=Dom, 1=Lun ... 6=Sab
  const diffToMonday = (dow === 0) ? -6 : 1 - dow;

  // Lunes de la semana ACTUAL (punto de referencia)
  const lunesActual = new Date(today);
  lunesActual.setDate(today.getDate() + diffToMonday);
  lunesActual.setHours(0,0,0,0);

  // Semana anterior (completa): lunes–domingo
  const lunesAnt = new Date(lunesActual); lunesAnt.setDate(lunesActual.getDate() - 7);
  const domingoAnt = new Date(lunesActual); domingoAnt.setDate(lunesActual.getDate() - 1);

  // Semana antepasada (completa): lunes–domingo
  const lunesAntAnt = new Date(lunesActual); lunesAntAnt.setDate(lunesActual.getDate() - 14);
  const domingoAntAnt = new Date(lunesActual); domingoAntAnt.setDate(lunesActual.getDate() - 8);

  return { lunesAnt, domingoAnt, lunesAntAnt, domingoAntAnt };
}

function fmtDate(d){
  const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${d.getDate()} ${meses[d.getMonth()]}`;
}

function filtrarSemana(lunesDate, domingoDate){
  return COBROS.filter(c => {
    const f = new Date(c.f + 'T00:00:00');
    return f >= lunesDate && f <= domingoDate;
  });
}

function calcSemana(cobros){
  const plus = cobros.filter(c => c.p === 'plus');
  const prime = cobros.filter(c => c.p === 'prime');
  const total = cobros.length;
  const ingTotal = cobros.reduce((s,c) => s + c.precio, 0);
  const ingPlus = plus.reduce((s,c) => s + c.precio, 0);
  const ingPrime = prime.reduce((s,c) => s + c.precio, 0);
  return {
    cobrados: total,
    plus: plus.length,
    prime: prime.length,
    mix_prime: total ? plus.length > 0 ? prime.length/total : 1 : 0,
    mix_plus: total ? plus.length/total : 0,
    ingresos_total: ingTotal,
    ingresos_plus: ingPlus,
    ingresos_prime: ingPrime,
  };
}

function renderSemana(){
  const { lunesAnt, domingoAnt, lunesAntAnt, domingoAntAnt } = getSemanas();

  const cobrosAnt    = filtrarSemana(lunesAnt,    domingoAnt);
  const cobrosAntAnt = filtrarSemana(lunesAntAnt, domingoAntAnt);
  const sa = calcSemana(cobrosAnt);
  const sp = calcSemana(cobrosAntAnt);

  // Helper delta
  function dc(va, vb, type='num'){
    if(vb === 0 && va === 0) return '<span class="delta-flat">0</span>';
    if(vb === 0) return va > 0 ? '<span class="delta-up">▲ Nuevo</span>' : '<span class="delta-flat">—</span>';
    const diff = va - vb;
    if(Math.abs(diff) < 0.001) return '<span class="delta-flat">0</span>';
    const cls = diff > 0 ? 'delta-up' : 'delta-down';
    const arrow = diff > 0 ? '▲' : '▼';
    const sign = diff > 0 ? '+' : '';
    if(type === 'pct') return `<span class="${cls}">${arrow} ${sign}${(diff*100).toFixed(1)}pp</span>`;
    const pctChg = (diff/vb)*100;
    return `<span class="${cls}">${arrow} ${sign}${pctChg.toFixed(1)}%</span>`;
  }

  let html = '<div class="fade">';

  // Header con fechas — ambas semanas completas
  html += `<div class="semana-header">
    <div class="semana-period current">
      <div class="semana-period-label">Semana anterior</div>
      <div class="semana-period-dates">${fmtDate(lunesAnt)} – ${fmtDate(domingoAnt)}</div>
    </div>
    <div class="semana-vs">vs</div>
    <div class="semana-period">
      <div class="semana-period-label">Semana antepasada</div>
      <div class="semana-period-dates">${fmtDate(lunesAntAnt)} – ${fmtDate(domingoAntAnt)}</div>
    </div>
  </div>`;

  // Sin cobros
  if(sa.cobrados === 0 && sp.cobrados === 0){
    html += `<div class="semana-zero">
      <div class="semana-zero-icon">📅</div>
      <div class="semana-zero-msg">Sin cobros registrados en estas semanas</div>
      <div class="semana-zero-sub">Actualiza el Excel con los datos más recientes y corre el script</div>
    </div>`;
    html += '</div>';
    return html;
  }

  // Tabla comparativa
  const rows = [
    ['Cobrados',        fmt.n(sa.cobrados),       fmt.n(sp.cobrados),       dc(sa.cobrados, sp.cobrados)],
    ['Plus / Prime',   `${sa.plus} / ${sa.prime}`,`${sp.plus} / ${sp.prime}`,'<span class="delta-flat">—</span>'],
    ['Mix Prime',       fmt.pct(sa.mix_prime),     fmt.pct(sp.mix_prime),    dc(sa.mix_prime, sp.mix_prime, 'pct')],
    ['Mix Plus',        fmt.pct(sa.mix_plus),      fmt.pct(sp.mix_plus),     dc(sa.mix_plus, sp.mix_plus, 'pct')],
    ['Ingresos totales',fmt.$(sa.ingresos_total),  fmt.$(sp.ingresos_total), dc(sa.ingresos_total, sp.ingresos_total)],
    ['Ingresos Plus',   fmt.$(sa.ingresos_plus),   fmt.$(sp.ingresos_plus),  dc(sa.ingresos_plus, sp.ingresos_plus)],
    ['Ingresos Prime',  fmt.$(sa.ingresos_prime),  fmt.$(sp.ingresos_prime), dc(sa.ingresos_prime, sp.ingresos_prime)],
  ];

  html += `<div class="sxs-table-panel">
    <table class="sxs-table">
      <thead>
        <tr>
          <th class="sxs-th-concept">Concepto</th>
          <th class="sxs-th-month">
            <span style="color:var(--sunset)">${fmtDate(lunesAnt)} – ${fmtDate(domingoAnt)}</span>
            <div class="sxs-th-meta">${sa.cobrados} cobrados</div>
          </th>
          <th class="sxs-th-month">
            ${fmtDate(lunesAntAnt)} – ${fmtDate(domingoAntAnt)}
            <div class="sxs-th-meta">${sp.cobrados} cobrados</div>
          </th>
          <th class="sxs-th-delta">Δ% <span class="sxs-th-meta-inline">(ant vs antep)</span></th>
        </tr>
      </thead>
      <tbody>`;

  rows.forEach(([label, va, vb, delta]) => {
    html += `<tr>
      <td class="sxs-td-concept">${label}</td>
      <td class="sxs-td-value">${va}</td>
      <td class="sxs-td-value">${vb}</td>
      <td class="sxs-td-delta">${delta}</td>
    </tr>`;
  });

  html += `</tbody></table></div>`;
  html += '</div>';
  return html;
}

// ==================== EVOLUCIÓN DE SALDOS ====================
const SALDOS = {
  meses: ['Enero', 'Febrero', 'Marzo', 'Abril'],
  aums: {
    plus:  [36077078.81, 35964176.17, 37319644.28, 38663310.81],
    prime: [108357988.33, 119641388.89, 119105548.29, 120623881.43],
    total: [144435067.14, 155605565.07, 156425192.58, 159287192.25],
  },
  ceje: {
    plus:  [480992.66, 389506.15, 1034549.70, 1066723.86],
    prime: [846616.60, 582809.57, 1902513.13, 3005741.17],
    total: [1327609.26, 972315.72, 2937062.83, 4072465.03],
  },
  pct: {
    plus:  [1.3332, 1.0830, 2.7721, 2.7590],
    prime: [0.7813, 0.4871, 1.5973, 2.4918],
    total: [0.9192, 0.6249, 1.8776, 2.5567],
  }
};

let saldosCharts = {};
let saldosView = 'total'; // 'total' | 'desglose'

function fmtM(n){ if(n>=1e6) return '$'+(n/1e6).toFixed(1)+'M'; if(n>=1e3) return '$'+(n/1e3).toFixed(0)+'K'; return '$'+Math.round(n); }
function deltaS(arr){ const p=((arr[arr.length-1]-arr[0])/arr[0])*100; return (p>=0?'+':'')+p.toFixed(1)+'%'; }

function renderSaldos(){
  return `<div class="fade" id="saldosRoot">
    <div class="section">
      <div class="section-title">
        <span class="section-num">S1</span>EVOLUCIÓN DE <span class="section-title-accent">SALDOS</span> · ENE–ABR 2026
      </div>

      <!-- Sub-toggle: Total vs Desglose -->
      <div style="display:flex;gap:8px;margin-bottom:20px;align-items:center">
        <span class="ctrl-label">Segmentación</span>
        <div class="mode-tabs">
          <button class="sub-tab active" id="saldosTabTotal" onclick="setSaldosView('total')">Total consolidado</button>
          <button class="sub-tab" id="saldosTabDesglose" onclick="setSaldosView('desglose')">Plus vs Prime</button>
        </div>
      </div>

      <!-- KPI Cards -->
      <div class="kpi-grid" id="saldosKPIs" style="margin-bottom:20px"></div>

      <!-- Charts grid -->
      <div class="two-col" style="margin-bottom:16px">
        <div class="panel">
          <div class="panel-title">AUMs TOTALES <span class="accent">· SALDO A CIERRE DE MES</span></div>
          <div style="font-size:10px;color:var(--text-mut);margin-bottom:14px;font-family:'Poppins',sans-serif;letter-spacing:1px">MILLONES DE PESOS · PORTAFOLIO TOTAL</div>
          <div style="position:relative;height:220px"><canvas id="chartAUMs"></canvas></div>
          <div id="legendAUMs" style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap"></div>
        </div>
        <div class="panel">
          <div class="panel-title">CUENTA EJE <span class="accent">· SALDO A CIERRE DE MES</span></div>
          <div style="font-size:10px;color:var(--text-mut);margin-bottom:14px;font-family:'Poppins',sans-serif;letter-spacing:1px">MILLONES DE PESOS · CUENTA OPERATIVA</div>
          <div style="position:relative;height:220px"><canvas id="chartCeje"></canvas></div>
          <div id="legendCeje" style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap"></div>
        </div>
      </div>

      <!-- Penetración full-width -->
      <div class="panel">
        <div class="panel-title">CUENTA EJE COMO % DE AUMs <span class="accent">· PENETRACIÓN MENSUAL</span></div>
        <div style="font-size:10px;color:var(--text-mut);margin-bottom:14px;font-family:'Poppins',sans-serif;letter-spacing:1px">LA CUENTA EJE GANA PESO DENTRO DEL PORTAFOLIO TOTAL: 0.9% → 2.6%</div>
        <div style="position:relative;height:180px"><canvas id="chartPct"></canvas></div>
        <div id="legendPct" style="display:flex;gap:20px;margin-top:12px;flex-wrap:wrap"></div>
      </div>
    </div>
  </div>`;
}

function setSaldosView(v){
  saldosView = v;
  document.getElementById('saldosTabTotal').classList.toggle('active', v==='total');
  document.getElementById('saldosTabDesglose').classList.toggle('active', v==='desglose');
  updateSaldosKPIs();
  updateSaldosCharts();
}

function legendHTML(datasets){
  return datasets.map(d=>`<div style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text-sec)">
    <div style="width:10px;height:10px;border-radius:50%;background:${d.borderColor};flex-shrink:0"></div>
    <span>${d.label}</span>
  </div>`).join('');
}

function saldosDatasets(key, isTotal){
  const D = SALDOS[key];
  const C = {azul:'#314566', sunset:'#C9A867', teal:'#317A70', light:'#838FA3'};
  const base = (label,data,color,dash=[])=>({
    label, data,
    borderColor:color, backgroundColor:color+'18',
    borderWidth:2, borderDash:dash,
    pointRadius:4, pointHoverRadius:7,
    pointBackgroundColor:color, pointBorderColor:'#0A0E14', pointBorderWidth:2,
    fill:true, tension:0.35
  });
  if(isTotal) return key==='pct'
    ? [{...base('Total', D.total, C.sunset), fill:true, backgroundColor:C.sunset+'20'}]
    : [base('Total', D.total, C.azul)];
  return [
    base('Plus', D.plus, C.azul),
    base('Prime', D.prime, C.sunset),
    base('Total', D.total, C.light, [5,4]),
  ];
}

function chartOptions(yFmt){
  return {
    responsive:true, maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{
      legend:{display:false},
      tooltip:{
        backgroundColor:'#0A0E14', borderColor:'#314566', borderWidth:1,
        titleColor:'#fff', bodyColor:'rgba(255,255,255,0.7)', padding:12,
        callbacks:{label:ctx=>`  ${ctx.dataset.label}: ${yFmt(ctx.parsed.y)}`}
      }
    },
    scales:{
      x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'rgba(255,255,255,0.38)',font:{size:11,family:'Open Sans'}},border:{color:'transparent'}},
      y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'rgba(255,255,255,0.38)',font:{size:10,family:'Open Sans'},callback:v=>yFmt(v)},border:{color:'transparent'}}
    }
  };
}

function updateSaldosKPIs(){
  const isTotal = saldosView==='total';
  const S = SALDOS;
  let cards = isTotal ? [
    {label:'AUMs Totales · Abril', val:fmtM(S.aums.total[3]), sub:'246 miembros cobrados', dlt:deltaS(S.aums.total), pos:true},
    {label:'Cuenta Eje · Abril', val:fmtM(S.ceje.total[3]), sub:'Saldo a cierre', dlt:deltaS(S.ceje.total), pos:true, hi:true},
    {label:'Penetración Cuenta Eje', val:S.pct.total[3].toFixed(2)+'%', sub:'% sobre AUMs totales', dlt:deltaS(S.pct.total)+' vs Enero', pos:true},
    {label:'AUMs por Cliente', val:fmtM(S.aums.total[3]/246), sub:'Promedio Abril · 246 cobrados', dlt:deltaS([S.aums.total[0]/246,S.aums.total[3]/246]), pos:true},
  ] : [
    {label:'AUMs Plus · Abril', val:fmtM(S.aums.plus[3]), sub:'59 clientes', dlt:deltaS(S.aums.plus), pos:true},
    {label:'AUMs Prime · Abril', val:fmtM(S.aums.prime[3]), sub:'118 clientes', dlt:deltaS(S.aums.prime), pos:true, hi:true},
    {label:'Cuenta Eje Plus · Abril', val:fmtM(S.ceje.plus[3]), sub:'Saldo a cierre', dlt:deltaS(S.ceje.plus), pos:true},
    {label:'Cuenta Eje Prime · Abril', val:fmtM(S.ceje.prime[3]), sub:'Saldo a cierre', dlt:deltaS(S.ceje.prime), pos:true, hi:true},
  ];
  document.getElementById('saldosKPIs').innerHTML = cards.map(c=>`
    <div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value" style="${c.hi?'color:var(--sunset)':''}">${c.val}</div>
      <div class="kpi-sub">${c.sub}</div>
      <div class="delta ${c.pos?'up':'down'}" style="margin-top:8px">
        <span class="delta-arrow">${c.pos?'▲':'▼'}</span> ${c.dlt}
      </div>
    </div>`).join('');
}

function updateSaldosCharts(){
  const isTotal = saldosView==='total';
  const L = SALDOS.meses;

  // Destroy existing
  Object.values(saldosCharts).forEach(c=>c.destroy());
  saldosCharts = {};

  const build = (id, key, yFmt) => {
    const ds = saldosDatasets(key, isTotal);
    const ctx = document.getElementById(id);
    if(!ctx) return null;
    const opts = chartOptions(yFmt);
    if(key==='pct') opts.scales.y.min = 0;
    return new Chart(ctx, {type:'line', data:{labels:L, datasets:ds}, options:opts});
  };

  saldosCharts.aums = build('chartAUMs', 'aums', v=>fmtM(v));
  saldosCharts.ceje = build('chartCeje', 'ceje', v=>fmtM(v));
  saldosCharts.pct  = build('chartPct', 'pct', v=>v.toFixed(1)+'%');

  ['AUMs','Ceje','Pct'].forEach(k=>{
    const el = document.getElementById('legend'+k);
    if(el && saldosCharts[k.toLowerCase()]) el.innerHTML = legendHTML(saldosCharts[k.toLowerCase()].data.datasets);
  });
}

function initSaldosCharts(){
  updateSaldosKPIs();
  updateSaldosCharts();
}

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', e => {
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.mode = tab.dataset.mode;
    render();
  });
});

document.getElementById('monthSingle').addEventListener('change', e => {
  state.single = e.target.value;
  render();
});
document.getElementById('monthA').addEventListener('change', e => {
  state.monthA = e.target.value;
  render();
});
document.getElementById('monthB').addEventListener('change', e => {
  state.monthB = e.target.value;
  render();
});

render();
</script>
</body>
</html>
