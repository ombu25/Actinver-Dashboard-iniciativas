<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impacto de Iniciativas — Personas Físicas Patrimonial</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-deep:#0A0E12;--bg-card:#141C2A;--bg-card-light:#1B2536;
  --line:rgba(255,255,255,0.07);--line-strong:rgba(255,255,255,0.13);
  --sunset:#E6C78A;--text-pri:#FFFFFF;--text-sec:rgba(255,255,255,0.60);
  --text-mut:rgba(255,255,255,0.34);
  --good:#5EE6A0;--bad:#FF8B8B;--warn:#FFC85C;
  --good-bg:rgba(94,230,160,0.10);--bad-bg:rgba(255,139,139,0.10);--warn-bg:rgba(255,200,92,0.10);
}
html,body{background:var(--bg-deep);color:var(--text-pri);font-family:'Open Sans',sans-serif;min-height:100vh;font-size:13px;line-height:1.5;
  background-image:radial-gradient(ellipse 90% 50% at 50% 0%,rgba(49,69,102,0.18),transparent 65%),radial-gradient(ellipse 50% 70% at 95% 100%,rgba(49,69,102,0.09),transparent 60%);background-attachment:fixed;}
.shell{max-width:1380px;margin:0 auto;padding:24px 28px 80px}
@media(max-width:768px){.shell{padding:16px 14px 60px}}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--line-strong);flex-wrap:wrap;gap:14px;}
.title-eye{font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;color:var(--text-mut);letter-spacing:3.5px;text-transform:uppercase;margin-bottom:6px;}
.title-main{font-family:'Poppins',sans-serif;font-size:26px;font-weight:300;line-height:1.15;}
.title-main b{font-weight:700}
.header-logo{height:34px;width:auto;opacity:.95;flex-shrink:0}
@media(max-width:480px){.title-main{font-size:19px}.header-logo{height:26px}}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--bg-card);border:1px solid var(--line);border-radius:4px;padding:11px 16px;margin-bottom:0;}
.ctrl-lbl{font-size:9px;font-weight:600;font-family:'Poppins',sans-serif;color:var(--text-mut);text-transform:uppercase;letter-spacing:2.5px;}
.tog{display:flex;background:var(--bg-deep);border:1px solid var(--line);border-radius:3px;padding:2px}
.tog-btn{padding:6px 14px;font-size:10px;font-family:'Poppins',sans-serif;font-weight:600;color:var(--text-mut);cursor:pointer;border-radius:2px;border:none;background:transparent;letter-spacing:1.5px;text-transform:uppercase;transition:all .18s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.tog-btn.on{background:var(--sunset);color:#0A0E12}
.tog-btn:hover:not(.on){color:var(--text-pri)}
.month-select{background:var(--bg-deep);border:1px solid var(--line);color:var(--text-pri);padding:6px 12px;border-radius:3px;font-family:'Open Sans',sans-serif;font-size:12px;cursor:pointer;font-weight:600;}
.month-select:focus{outline:none;border-color:var(--sunset)}
.month-select option{background:#1B2536}
.resumen-btn{margin-left:auto;display:flex;align-items:center;gap:7px;padding:7px 16px;background:transparent;border:1px solid var(--sunset);border-radius:3px;color:var(--sunset);font-family:'Poppins',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .18s;}
.resumen-btn:hover{background:rgba(230,199,138,0.08)}
.resumen-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
.legend-wrap{display:flex;align-items:center;gap:14px;padding-left:6px;border-left:1px solid var(--line);}
.legend-item{display:flex;align-items:center;gap:5px;font-size:9px;font-family:'Poppins',sans-serif;font-weight:600;color:var(--text-mut);letter-spacing:1px;text-transform:uppercase;white-space:nowrap;}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
@media(max-width:900px){.legend-wrap{display:none}}
.cat-tabs-wrap{margin-top:20px;margin-bottom:24px;border-bottom:1px solid var(--line-strong);}
.cat-tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{padding:10px 20px;font-size:10px;font-family:'Poppins',sans-serif;font-weight:600;color:var(--text-mut);cursor:pointer;border:none;background:transparent;letter-spacing:1.5px;text-transform:uppercase;white-space:nowrap;border-bottom:2px solid transparent;transition:all .18s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;margin-bottom:-1px;}
.cat-tab:hover{color:var(--text-sec)}
.cat-tab.on{color:var(--sunset);border-bottom-color:var(--sunset);}
@media(max-width:600px){.cat-tab{font-size:9px;padding:9px 14px}}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:3px;}
.status-badge.green{color:var(--good);background:var(--good-bg);border:1px solid rgba(94,230,160,.18)}
.status-badge.yellow{color:var(--warn);background:var(--warn-bg);border:1px solid rgba(255,200,92,.18)}
.status-badge.blue{color:#7EB8F7;background:rgba(126,184,247,0.10);border:1px solid rgba(126,184,247,.18)}
.status-badge.red{color:var(--bad);background:var(--bad-bg);border:1px solid rgba(255,139,139,.18)}
.status-badge.gray{color:var(--text-sec);background:rgba(255,255,255,0.05);border:1px solid var(--line)}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.status-dot.green{background:var(--good)}.status-dot.yellow{background:var(--warn)}.status-dot.blue{background:#7EB8F7}.status-dot.red{background:var(--bad)}.status-dot.gray{background:rgba(255,255,255,0.3)}
/* GENERAL */
.general-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
@media(max-width:600px){.general-grid{grid-template-columns:1fr 1fr}}
@media(max-width:400px){.general-grid{grid-template-columns:1fr}}
.general-cat-label{font-family:'Poppins',sans-serif;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--sunset);margin:24px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
.general-cat-label:first-child{margin-top:0}
.mini-card{background:var(--bg-card);border:1px solid var(--line);border-radius:5px;overflow:hidden;position:relative;cursor:pointer;transition:border-color .18s,background .18s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.mini-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--sunset),transparent 55%);}
.mini-card:hover{border-color:rgba(230,199,138,0.3);background:var(--bg-card-light);}
.mini-card-inner{padding:12px 14px 10px;}
.mini-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.mini-card-title{font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;color:var(--text-pri);line-height:1.25;flex:1;}
.mini-kpi-label{font-size:8px;color:var(--text-mut);text-transform:uppercase;letter-spacing:1.5px;font-family:'Poppins',sans-serif;font-weight:600;}
.mini-kpi-val{font-size:16px;font-family:'Poppins',sans-serif;font-weight:300;color:var(--text-pri);line-height:1;letter-spacing:-.5px;}
.mini-kpi-row{margin-bottom:8px;}
.mini-kpi-row:last-child{margin-bottom:0}
.mini-delta{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;padding:2px 6px;border-radius:2px;margin-top:4px;}
.mini-delta.up{background:var(--good-bg);color:var(--good)}.mini-delta.dn{background:var(--bad-bg);color:var(--bad)}.mini-delta.fl{background:rgba(255,255,255,0.04);color:var(--text-mut)}
.mini-card-footer{padding:6px 14px 8px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.mini-goto{font-size:8.5px;color:var(--text-mut);font-family:'Poppins',sans-serif;letter-spacing:1px;text-transform:uppercase;}
.mini-arrow{font-size:10px;color:var(--text-mut);}
.mini-no-kpi{padding:10px 14px 12px;font-size:10.5px;color:var(--text-mut);font-style:italic;line-height:1.5;}
/* STATUS TEXT — below title, no box */
.card-status-text{font-family:'Poppins',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;line-height:1;}
.card-status-text.green{color:var(--good)}
.card-status-text.blue{color:#7EB8F7}
.card-status-text.yellow{color:var(--warn)}
/* IMPACT DOT — Opción A */
.impact-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;align-self:center;margin-top:2px;}
.impact-icon{width:28px;height:28px;flex-shrink:0;align-self:center;}
.init-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:4px;}
@media(max-width:700px){.init-grid{grid-template-columns:1fr}}
.init-card{background:var(--bg-card);border:1px solid var(--line);border-radius:5px;overflow:hidden;position:relative;display:flex;flex-direction:column;}
.init-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--sunset) 0%,transparent 55%);}
.card-top{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.card-top-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.card-title{font-family:'Poppins',sans-serif;font-size:16px;font-weight:600;color:var(--text-pri);line-height:1.2;}
.kpi-list{padding:0 16px 12px;display:flex;flex-direction:column;gap:8px}
.kpi-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;background:rgba(255,255,255,0.028);border-radius:3px;border:1px solid var(--line);}
.kpi-row-left{flex:1;min-width:0}
.kpi-row-label{font-size:9px;color:var(--text-mut);text-transform:uppercase;letter-spacing:1.5px;font-family:'Poppins',sans-serif;font-weight:600;margin-bottom:4px;line-height:1.3;}
.kpi-row-val{font-size:22px;font-family:'Poppins',sans-serif;font-weight:300;color:var(--text-pri);line-height:1;letter-spacing:-.5px;}
.kpi-row-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-family:'JetBrains Mono',monospace;font-weight:600;padding:3px 7px;border-radius:2px;}
.kpi-delta.up{background:var(--good-bg);color:var(--good)}.kpi-delta.dn{background:var(--bad-bg);color:var(--bad)}.kpi-delta.fl{background:rgba(255,255,255,0.04);color:var(--text-mut)}
.meta-wrap{text-align:right}.meta-bar-bg{height:3px;width:72px;background:rgba(255,255,255,0.07);border-radius:2px;margin-top:3px}
.meta-bar-fill{height:3px;border-radius:2px;transition:width .4s}
.meta-bar-fill.g{background:var(--good)}.meta-bar-fill.y{background:var(--warn)}.meta-bar-fill.r{background:var(--bad)}
.meta-txt{font-size:9px;color:var(--text-mut);font-family:'JetBrains Mono',monospace}
.card-chart{padding:0 16px 12px}
.chart-lbl{font-size:9px;color:var(--text-mut);font-family:'Poppins',sans-serif;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.chart-wrap{position:relative;height:130px}
.card-pending{padding:8px 16px 14px}
.pending-badge{display:inline-flex;align-items:center;gap:6px;font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--warn);background:var(--warn-bg);border:1px solid rgba(255,200,92,.18);padding:5px 12px;border-radius:3px;}
.release-badge{display:inline-flex;align-items:center;gap:6px;font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--good);background:var(--good-bg);border:1px solid rgba(94,230,160,.18);padding:5px 12px;border-radius:3px;}
.pending-note{margin-top:8px;font-size:11px;color:var(--text-sec);line-height:1.6}
.desc-toggle{width:100%;text-align:left;border:none;background:transparent;color:inherit;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--line);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:'Poppins',sans-serif;font-size:9.5px;font-weight:600;color:var(--text-mut);letter-spacing:2px;text-transform:uppercase;transition:color .15s;margin-top:auto;}
.desc-toggle:hover{color:var(--text-sec)}.desc-chevron{font-size:9px;transition:transform .2s;flex-shrink:0}
.desc-body{display:none;padding:0 16px 16px;font-size:12px;color:var(--text-sec);line-height:1.7;}
.desc-body.open{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
/* DESC SECTIONS */
.desc-section{margin-bottom:14px}
.desc-section:last-child{margin-bottom:0}
.desc-section-lbl{font-size:8.5px;font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sunset);margin-bottom:5px;}
.desc-responsible{display:flex;align-items:center;gap:10px;}
.desc-resp-avatar{width:28px;height:28px;border-radius:50%;background:rgba(49,69,102,0.6);border:1px solid rgba(255,255,255,0.12);display:flex;align-items:center;justify-content:center;font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;color:var(--sunset);flex-shrink:0;}
.desc-resp-name{font-size:12px;font-weight:600;color:var(--text-pri);font-family:'Poppins',sans-serif;}
.desc-resp-role{font-size:10px;color:var(--text-mut);}
.desc-plan-list{list-style:none;display:flex;flex-direction:column;gap:6px;}
.desc-plan-list li{display:flex;align-items:flex-start;gap:8px;font-size:11px;color:var(--text-sec);line-height:1.5;}
.desc-plan-list li::before{content:'';display:block;width:5px;height:5px;border-radius:50%;background:var(--sunset);flex-shrink:0;margin-top:5px;}
/* PLANS MODAL */
.plans-table{width:100%;border-collapse:collapse;font-size:12px;}
.plans-table thead th{font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-mut);padding:10px 12px;text-align:left;border-bottom:1px solid var(--line-strong);white-space:nowrap;}
.plans-table tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);}
.plans-table tbody tr:hover{background:rgba(255,255,255,0.022)}
.plans-tbl-cat td{padding:16px 12px 6px!important;border-top:1px solid var(--line-strong)!important;color:var(--sunset);font-family:'Poppins',sans-serif;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;background:#0A0E12;}
.plans-tbl-name{font-family:'Poppins',sans-serif;font-weight:600;font-size:12px;color:var(--text-pri);padding:12px 12px!important;vertical-align:top;white-space:nowrap;}
.plans-tbl-resp{font-size:11px;color:var(--text-sec);padding:12px 12px!important;vertical-align:top;white-space:nowrap;}
.plans-tbl-plans{padding:10px 12px!important;vertical-align:top;}
.plans-tbl-plan-item{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:var(--text-sec);line-height:1.5;margin-bottom:5px;}
.plans-tbl-plan-item:last-child{margin-bottom:0}
.plans-tbl-plan-item::before{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--sunset);flex-shrink:0;margin-top:5px;}
.modal-toggle-wrap{display:flex;gap:4px;background:var(--bg-deep);border:1px solid var(--line);border-radius:3px;padding:2px;}
.modal-tog-btn{padding:5px 12px;font-size:9px;font-family:'Poppins',sans-serif;font-weight:600;color:var(--text-mut);cursor:pointer;border-radius:2px;border:none;background:transparent;letter-spacing:1.5px;text-transform:uppercase;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.modal-tog-btn.on{background:var(--sunset);color:#0A0E12}
.plans-btn{display:flex;align-items:center;gap:7px;padding:7px 16px;background:transparent;border:1px solid rgba(255,255,255,0.18);border-radius:3px;color:var(--text-sec);font-family:'Poppins',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .18s;}
.plans-btn:hover{border-color:rgba(255,255,255,0.35);color:var(--text-pri)}
.plans-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(5,8,12,0.92);z-index:9999;display:none;overflow-y:scroll;-webkit-overflow-scrolling:touch;}
.modal-overlay.open{display:block;}
.modal-box{background:#141C2A;border:1px solid rgba(255,255,255,0.15);border-radius:8px;width:calc(100% - 32px);max-width:1100px;margin:24px auto 60px;}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(255,255,255,0.13);border-radius:8px 8px 0 0;background:#141C2A;}
.modal-title{font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sunset);}
.modal-close{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);width:32px;height:32px;border-radius:3px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.modal-close:hover{color:#fff;}
.modal-body{padding:0 22px 28px;}
.modal-period{font-size:10px;color:var(--text-mut);font-family:'JetBrains Mono',monospace;letter-spacing:1px;padding:14px 0 16px;}
.summary-table{width:100%;border-collapse:collapse;font-size:12px;}
.summary-table thead th{font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-mut);padding:10px 12px;text-align:left;border-bottom:1px solid var(--line-strong);white-space:nowrap;}
.summary-table thead th.th-num{text-align:right;}
.summary-table tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background .12s;}
.summary-table tbody tr:hover{background:rgba(255,255,255,0.022)}
.tbl-cat td{padding:18px 12px 7px!important;border-top:1px solid var(--line-strong)!important;border-bottom:1px solid var(--line-strong)!important;color:var(--sunset);font-family:'Poppins',sans-serif;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;background:#0A0E12;}
.tbl-init-cell{font-family:'Poppins',sans-serif;font-weight:600;font-size:12.5px;color:var(--text-pri);padding:12px 12px 4px!important;vertical-align:top;}
.tbl-status-cell{padding:12px 12px 4px!important;vertical-align:top;}
.tbl-kpi-name-cell{font-size:10.5px;color:var(--text-sec);padding:4px 12px!important;vertical-align:middle;}
.tbl-kpi-name-cell.first{padding-top:12px!important;}.tbl-kpi-name-cell.last{padding-bottom:12px!important;}
.tbl-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text-mut);padding:4px 12px!important;text-align:right;vertical-align:middle;white-space:nowrap;}
.tbl-val.first{padding-top:12px!important;}.tbl-val.last{padding-bottom:12px!important;}
.tbl-val.cur{color:var(--text-pri);}
.tbl-delta-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:4px 12px!important;text-align:right;vertical-align:middle;white-space:nowrap;}
.tbl-delta-num.first{padding-top:12px!important;}.tbl-delta-num.last{padding-bottom:12px!important;}
.tbl-delta-num.up{color:var(--good)}.tbl-delta-num.dn{color:var(--bad)}.tbl-delta-num.fl{color:var(--text-mut)}
.tbl-delta-pct{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;padding:4px 12px!important;text-align:right;vertical-align:middle;white-space:nowrap;}
.tbl-delta-pct.first{padding-top:12px!important;}.tbl-delta-pct.last{padding-bottom:12px!important;}
.tbl-pct-badge{display:inline-block;padding:2px 7px;border-radius:2px;}
.tbl-pct-badge.up{background:var(--good-bg);color:var(--good)}.tbl-pct-badge.dn{background:var(--bad-bg);color:var(--bad)}.tbl-pct-badge.fl{color:var(--text-mut)}
@media(max-width:600px){.modal-body{padding:0 12px 16px}.modal-header{padding:14px;}.tbl-kpi-name-cell{font-size:9.5px}}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div>
      <div class="title-eye">Uso interno · Growth · Mayo 2026</div>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getVal(k){
  const d=k.data.filter(v=>v!=null);
  if(dataView==='mvm') return k.data[monthIdx];
  // acumulado: sum of non-null up to monthIdx
  return k.data.slice(0,monthIdx+1).reduce((a,v)=>a+(v||0),0);
}
function getPrev(k){
  if(dataView==='mvm'){
    // find previous non-null value
    for(let i=monthIdx-1;i>=0;i--){if(k.data[i]!=null)return k.data[i];}
    return null;
  }
  if(monthIdx===0) return null;
  return k.data.slice(0,monthIdx).reduce((a,v)=>a+(v||0),0);
}
function getChartData(k){
  if(dataView==='mvm') return k.data.slice(0,monthIdx+1).map(v=>v==null?NaN:v);
  let c=0,a=[];k.data.slice(0,monthIdx+1).forEach(v=>{c+=(v||0);a.push(c);});return a;
}
function fmtD(prev,cur){
  if(prev==null||cur==null||prev===0)return{str:'—',cls:'fl'};
  const p=((cur-prev)/Math.abs(prev))*100;
  return{str:(p>=0?'+':'')+p.toFixed(1)+'%',cls:p>0.5?'up':p<-0.5?'dn':'fl'};
}
function metaC(pct){if(pct>=85)return'g';if(pct>=60)return'y';return'r';}

// ── CONTROLS ─────────────────────────────────────────────────────────────────
function setDataView(v){
  dataView=v;
  document.getElementById('btnMvM').classList.toggle('on',v==='mvm');
  document.getElementById('btnAcum').classList.toggle('on',v==='acum');
  document.getElementById('monthWrap').style.display=v==='mvm'?'flex':'none';
  document.getElementById('btnAcum').textContent=v==='acum'?'Acumulado 2026':'Acumulado';
  refreshActivePanel();
}
function setMonth(val){
  monthIdx=parseInt(val)-1;
  refreshActivePanel();
}

// Refresh only the currently visible panel (data changed, layout stays)
function refreshActivePanel(){
  Object.keys(charts).forEach(id=>{if(charts[id]){charts[id].destroy();delete charts[id];}});
  // Make sure active panel is visible
  document.querySelectorAll('.cat-panel').forEach(p=>{p.style.display='none';});
  const tabs=getTabDefs();
  const def=tabs.find(t=>t.id===activeTab);
  const panel=def?document.getElementById(def.panelId):null;
  if(panel) panel.style.display='block';
  if(activeTab==='general'){
    buildGeneralPanel();
  } else {
    const cat=CATEGORIES.find(c=>c.id===activeTab);
    if(cat) buildDetailPanel(cat);
  }
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function getTabDefs(){return[{id:'general',label:'General',panelId:'panelGeneral'},...CATEGORIES.map(c=>({id:c.id,label:c.title,panelId:c.panelId}))];}

function buildTabs(){
  const wrap=document.getElementById('catTabs');wrap.innerHTML='';
  const tabs=getTabDefs();
  tabs.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='cat-tab'+(t.id===activeTab?' on':'');
    btn.textContent=t.label;btn.type='button';
    btn.onclick=()=>switchTab(t.id);
    wrap.appendChild(btn);
  });
}

function switchTab(id){
  if(activeTab===id) return;
  activeTab=id;

  // Destroy all charts
  Object.keys(charts).forEach(cid=>{if(charts[cid]){charts[cid].destroy();delete charts[cid];}});

  // Update tab highlight
  const tabs=getTabDefs();
  document.querySelectorAll('.cat-tab').forEach((btn,i)=>{btn.classList.toggle('on',tabs[i]&&tabs[i].id===id);});

  // Hide ALL panels with inline style (overrides CSS)
  document.querySelectorAll('.cat-panel').forEach(p=>{p.style.display='none';});

  // Show the target panel immediately with inline style
  const def=tabs.find(t=>t.id===id);
  const targetPanel = def ? document.getElementById(def.panelId) : null;
  if(targetPanel) targetPanel.style.display='block';

  // Build content into the now-visible panel
  if(id==='general'){
    buildGeneralPanel();
  } else {
    const cat=CATEGORIES.find(c=>c.id===id);
    if(cat) buildDetailPanel(cat);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── GENERAL PANEL ────────────────────────────────────────────────────────────
function buildGeneralPanel(){
  const panel=document.getElementById('panelGeneral');panel.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const lbl=document.createElement('div');lbl.className='general-cat-label';lbl.textContent=cat.title;panel.appendChild(lbl);
    const grid=document.createElement('div');grid.className='general-grid';
    cat.items.forEach(init=>grid.appendChild(buildMiniCard(init,cat.id)));
    panel.appendChild(grid);
  });
}
function buildMiniCard(init,catId){
  const card=document.createElement('div');card.className='mini-card';card.onclick=()=>switchTab(catId);
  const st=STATUSES[init.status]||STATUSES.implementacion;
  const impactEl=init.impact&&init.impact!=='none'?impactHtml(init.impact):'';

  if(init.noKpis){
    card.innerHTML=`
      <div class="mini-card-inner">
        <div class="mini-card-top"><div class="mini-card-title">${init.title}</div>${impactEl}</div>
        <div class="card-status-text ${st.color}" style="font-size:8px;margin-top:2px">${st.label}</div>
      </div>
      <div class="mini-no-kpi">${init.pendingNote||init.releaseNote||'En planeación'}</div>
      <div class="mini-card-footer"><span class="mini-goto">Ver detalle</span><span class="mini-arrow">→</span></div>`;
    return card;
  }

  // Build all KPI rows
  let kpiRows='';
  init.kpis.forEach(k=>{
    const val=getVal(k),prev=getPrev(k),d=fmtD(prev,val);
    const displayVal=val==null?'—':k.fmt(val);
    kpiRows+=`<div class="mini-kpi-row">
      <div class="mini-kpi-label">${k.label}</div>
      <div style="display:flex;align-items:baseline;gap:8px;flex-wrap:wrap">
        <span class="mini-kpi-val">${displayVal}</span>
        <span class="mini-delta ${d.cls}">${d.cls==='up'?'▲':d.cls==='dn'?'▼':'—'} ${d.str}</span>
      </div>
    </div>`;
  });

  card.innerHTML=`
    <div class="mini-card-inner">
      <div class="mini-card-top"><div class="mini-card-title">${init.title}</div>${impactEl}</div>
      <div class="card-status-text ${st.color}" style="font-size:8px;margin-top:2px;margin-bottom:8px">${st.label}</div>
      ${kpiRows}
    </div>
    <div class="mini-card-footer"><span class="mini-goto">Ver detalle</span><span class="mini-arrow">→</span></div>`;
  return card;
}

// ── DETAIL PANEL ─────────────────────────────────────────────────────────────
function buildDetailPanel(cat){
  const panel=document.getElementById(cat.panelId);
  panel.innerHTML='';
  const grid=document.createElement('div');
  grid.className='init-grid';
  cat.items.forEach(init=>grid.appendChild(buildCard(init)));
  panel.appendChild(grid);
  // Use setTimeout to ensure DOM is painted and panel is visible before Chart.js measures
  setTimeout(()=>{
    cat.items.forEach(init=>{if(!init.noKpis)renderChart(init);});
  }, 50);
}
function buildCard(init){
  const el=document.createElement('div');el.className='init-card';el.id='card-'+init.id;
  let kpiHtml='';
  if(!init.noKpis&&init.kpis){init.kpis.forEach(k=>{
    const val=getVal(k),prev=getPrev(k),d=fmtD(prev,val);
    const displayVal=val==null?'—':k.fmt(val);
    const pct=k.meta&&val!=null?Math.min(Math.round((val/k.meta)*100),100):null,mc=pct!=null?metaC(pct):null;
    kpiHtml+=`<div class="kpi-row"><div class="kpi-row-left"><div class="kpi-row-label">${k.label}</div><div class="kpi-row-val">${displayVal}</div></div><div class="kpi-row-right"><div class="kpi-delta ${d.cls}">${d.cls==='up'?'▲':d.cls==='dn'?'▼':'—'} ${d.str}</div>${pct!=null?`<div class="meta-wrap"><div class="meta-txt">Meta: ${k.fmt(k.meta)} · ${pct}%</div><div class="meta-bar-bg"><div class="meta-bar-fill ${mc}" style="width:${pct}%"></div></div></div>`:''}</div></div>`;
  });}
  let pendingHtml='';
  if(init.noKpis){if(init.pendingNote)pendingHtml=`<div class="card-pending"><div class="pending-badge">Sin KPIs definidos</div><div class="pending-note">${init.pendingNote}</div></div>`;else if(init.releaseNote)pendingHtml=`<div class="card-pending"><div class="release-badge">En tiempo · Liberación confirmada</div><div class="pending-note">${init.releaseNote}</div></div>`;}
  let chartHtml='';
  if(!init.noKpis&&init.kpis){const lbl=dataView==='mvm'?`Tendencia mensual · hasta ${MONTH_NAMES[monthIdx]}`:`Acumulado · hasta ${MONTH_NAMES[monthIdx]}`;chartHtml=`<div class="card-chart"><div class="chart-lbl">${lbl}</div><div class="chart-wrap"><canvas id="chart-${init.id}"></canvas></div></div>`;}
  const planItems=init.plan?init.plan.map(p=>`<li>${p}</li>`).join(''):'<li>Por definir</li>';
  const ownerHtml=init.owner?`<div class="desc-responsible"><div class="desc-resp-avatar">${init.owner.initials}</div><div><div class="desc-resp-name">${init.owner.name}</div><div class="desc-resp-role">${init.owner.role}</div></div></div>`:'<div style="color:var(--text-mut);font-size:11px">Por asignar</div>';
  const impactColors={green:'#3B6D11',yellow:'#BA7517',red:'#E24B4A',none:'rgba(255,255,255,0.2)'};
  const impactBg={green:'rgba(59,109,17,0.10)',yellow:'rgba(186,117,23,0.10)',red:'rgba(226,75,74,0.10)',none:'rgba(255,255,255,0.04)'};
  const ic=impactColors[init.impact]||impactColors.none;
  const ib=impactBg[init.impact]||impactBg.none;
  const statusNoteHtml=`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:${ib};border-radius:3px;border:1px solid ${ic}22">
    <span style="display:block;width:8px;height:8px;border-radius:50%;background:${ic};flex-shrink:0;margin-top:4px"></span>
    <div style="font-size:11px;color:var(--text-sec);line-height:1.6">${init.statusNote||'Evaluación de impacto pendiente.'}</div>
  </div>`;
  const descContent=`
    <div class="desc-section">
      <div class="desc-section-lbl">Responsable</div>
      ${ownerHtml}
    </div>
    <div class="desc-section">
      <div class="desc-section-lbl">Descripción</div>
      <div style="font-size:12px;color:var(--text-sec);line-height:1.7">${init.desc||''}</div>
    </div>
    <div class="desc-section">
      <div class="desc-section-lbl">Estatus del semáforo</div>
      ${statusNoteHtml}
    </div>
    <div class="desc-section">
      <div class="desc-section-lbl">Plan de acción</div>
      <ul class="desc-plan-list">${planItems}</ul>
    </div>`;
  el.innerHTML=`<div class="card-top"><div class="card-top-left"><div class="card-title">${init.title}</div>${statusBadgeHtml(init.status)}</div>${init.impact&&init.impact!=='none'?impactHtml(init.impact):''}</div>${init.noKpis?pendingHtml:`<div class="kpi-list">${kpiHtml}</div>`}${chartHtml}<button class="desc-toggle" type="button" onclick="toggleDesc('${init.id}')"><span>Descripción de la iniciativa</span><span class="desc-chevron" id="chev-${init.id}">▼</span></button><div class="desc-body" id="desc-${init.id}">${descContent}</div>`;
  return el;
}
function toggleDesc(id){const b=document.getElementById('desc-'+id),c=document.getElementById('chev-'+id),o=b.classList.toggle('open');c.style.transform=o?'rotate(180deg)':'';}

function renderChart(init){
  if(init.noKpis||!init.kpis)return;
  const cid=init.id;if(charts[cid]){charts[cid].destroy();delete charts[cid];}
  const ctx=document.getElementById('chart-'+cid);if(!ctx)return;
  const labels=MONTH_LABELS.slice(0,monthIdx+1),colors=['#E6C78A','#5EE6A0','#7B9FD4','#C084FC'];
  const datasets=init.kpis.map((k,i)=>({label:k.label,data:getChartData(k).slice(0,monthIdx+1),borderColor:colors[i]||colors[0],backgroundColor:(colors[i]||colors[0])+'14',borderWidth:i===0?2:1.5,pointRadius:3,pointHoverRadius:6,pointBackgroundColor:colors[i]||colors[0],pointBorderColor:'#0A0E12',pointBorderWidth:2,fill:i===0,tension:0.35,spanGaps:true}));
  if(init.kpis[0].meta){const mv=dataView==='acum'?init.kpis[0].meta*(monthIdx+1):init.kpis[0].meta;datasets.push({label:'Meta',data:Array(labels.length).fill(mv),borderColor:'rgba(255,255,255,0.16)',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0});}
  charts[cid]=new Chart(ctx,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:init.kpis.length>1,position:'bottom',labels:{color:'rgba(255,255,255,0.38)',font:{size:9,family:'Open Sans'},padding:10,boxWidth:8}},tooltip:{backgroundColor:'#0A0E12',borderColor:'#314566',borderWidth:1,titleColor:'#fff',bodyColor:'rgba(255,255,255,0.65)',padding:9,callbacks:{label:ctx=>{const ki=init.kpis[ctx.datasetIndex];return`  ${ctx.dataset.label}: ${ki&&ctx.parsed.y!=null?ki.fmt(ctx.parsed.y):ctx.parsed.y??'—'}`}}}},scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(255,255,255,0.28)',font:{size:9}},border:{color:'transparent'}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(255,255,255,0.28)',font:{size:9}},border:{color:'transparent'}}}}});}

let modalView='mvm';

function buildModalTable(){
  // Use modal's own view state, not global dataView
  const mIdx=monthIdx;
  const mView=modalView;
  const prevName=mIdx>0?MONTH_NAMES[mIdx-1]:'—',curName=MONTH_NAMES[mIdx];
  document.getElementById('modalPeriod').textContent=mView==='mvm'?`Mes vs Mes · ${curName} vs ${prevName}`:`Acumulado 2026 · hasta ${curName}`;
  const container=document.getElementById('modal-table-content');container.innerHTML='';
  const tbl=document.createElement('table');tbl.className='summary-table';
  tbl.innerHTML=`<thead><tr><th style="min-width:130px">Iniciativa</th><th>Estatus</th><th style="width:36px;text-align:center">Impacto</th><th>KPI</th><th class="th-num">${prevName}</th><th class="th-num">${curName}</th><th class="th-num">Δ Número</th><th class="th-num">Δ %</th></tr></thead>`;
  const tbody=document.createElement('tbody');

  // Helper using modal's own view
  const mGetVal=(k)=>{
    if(mView==='mvm') return k.data[mIdx];
    return k.data.slice(0,mIdx+1).reduce((a,v)=>a+(v||0),0);
  };
  const mGetPrev=(k)=>{
    if(mView==='mvm'){for(let i=mIdx-1;i>=0;i--){if(k.data[i]!=null)return k.data[i];}return null;}
    if(mIdx===0)return null;
    return k.data.slice(0,mIdx).reduce((a,v)=>a+(v||0),0);
  };

  CATEGORIES.forEach(cat=>{
    const cr=document.createElement('tr');cr.className='tbl-cat';cr.innerHTML=`<td colspan="8">${cat.title}</td>`;tbody.appendChild(cr);
    cat.items.forEach(init=>{
      if(init.noKpis){
        const tr=document.createElement('tr');
        tr.innerHTML=`<td class="tbl-init-cell">${init.title}</td><td class="tbl-status-cell">${statusBadgeHtml(init.status)}</td><td style="text-align:center;padding:10px 8px">${init.impact&&init.impact!=='none'?impactHtml(init.impact):''}</td><td colspan="5" style="padding:10px 12px;font-size:11px;color:var(--text-mut);font-style:italic">${init.pendingNote||init.releaseNote||'Sin KPIs'}</td>`;
        tbody.appendChild(tr);return;
      }
      init.kpis.forEach((k,ki)=>{
        const isF=ki===0,isL=ki===init.kpis.length-1,fc=isF?' first':'',lc=isL?' last':'';
        const val=mGetVal(k),prev=mGetPrev(k);
        const dN=prev!=null&&val!=null?val-prev:null;
        const dP=dN!=null&&prev!==0?(dN/Math.abs(prev))*100:null;
        const cls=dN==null?'fl':dN>0.0001?'up':dN<-0.0001?'dn':'fl',arrow=cls==='up'?'▲ ':cls==='dn'?'▼ ':'';
        const fmtDN=(dn)=>{if(dn==null)return'—';const sign=dn>=0?'+':'-';const raw=String(k.fmt(Math.abs(dn)));if(raw.startsWith('$'))return'$'+sign.replace('+','')+raw.slice(1);return sign+raw.replace(/^\+/,'');};
        const tr=document.createElement('tr');
        if(isF){
          const td1=document.createElement('td');td1.className='tbl-init-cell';td1.rowSpan=init.kpis.length;td1.style.cssText='vertical-align:top;border-right:1px solid rgba(255,255,255,0.07)';td1.textContent=init.title;tr.appendChild(td1);
          const td2=document.createElement('td');td2.className='tbl-status-cell';td2.rowSpan=init.kpis.length;td2.style.cssText='vertical-align:top;border-right:1px solid rgba(255,255,255,0.07)';td2.innerHTML=statusBadgeHtml(init.status);tr.appendChild(td2);
          const td3=document.createElement('td');td3.rowSpan=init.kpis.length;td3.style.cssText='text-align:center;vertical-align:top;padding:10px 8px;border-right:1px solid rgba(255,255,255,0.07)';td3.innerHTML=init.impact&&init.impact!=='none'?impactHtml(init.impact):'';tr.appendChild(td3);
        }
        const tn=document.createElement('td');tn.className=`tbl-kpi-name-cell${fc}${lc}`;tn.textContent=k.label;tr.appendChild(tn);
        const tp=document.createElement('td');tp.className=`tbl-val${fc}${lc}`;tp.textContent=prev!=null?k.fmt(prev):'—';tr.appendChild(tp);
        const tc=document.createElement('td');tc.className=`tbl-val cur${fc}${lc}`;tc.textContent=val!=null?k.fmt(val):'—';tr.appendChild(tc);
        const tdn=document.createElement('td');tdn.className=`tbl-delta-num ${cls}${fc}${lc}`;tdn.textContent=dN!=null?arrow+fmtDN(dN):'—';tr.appendChild(tdn);
        const tdp=document.createElement('td');tdp.className=`tbl-delta-pct${fc}${lc}`;const badge=document.createElement('span');badge.className=`tbl-pct-badge ${cls}`;badge.textContent=dP!=null?(dP>=0?'+':'')+dP.toFixed(1)+'%':'—';tdp.appendChild(badge);tr.appendChild(tdp);
        tbody.appendChild(tr);
      });
    });
  });
  tbl.appendChild(tbody);container.appendChild(tbl);
}

function buildPlansTable(){
  const container=document.getElementById('plans-table-content');container.innerHTML='';
  const tbl=document.createElement('table');tbl.className='plans-table';
  tbl.innerHTML=`<thead><tr><th>Iniciativa</th><th>Estatus</th><th>Responsable</th><th>Plan de acción</th></tr></thead>`;
  const tbody=document.createElement('tbody');
  CATEGORIES.forEach(cat=>{
    const cr=document.createElement('tr');cr.className='plans-tbl-cat';cr.innerHTML=`<td colspan="4">${cat.title}</td>`;tbody.appendChild(cr);
    cat.items.forEach(init=>{
      const tr=document.createElement('tr');
      const planItems=(init.plan||['Por definir']).map(p=>`<div class="plans-tbl-plan-item">${p}</div>`).join('');
      const respHtml=init.owner?`<div style="font-weight:600;color:var(--text-pri);font-size:11px">${init.owner.name}</div><div style="font-size:10px;color:var(--text-mut)">${init.owner.role}</div>`:'<span style="color:var(--text-mut);font-size:11px">Por asignar</span>';
      const dotHtml=init.impact&&init.impact!=='none'?`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${init.impact==='red'?'#E24B4A':init.impact==='yellow'?'#BA7517':'#3B6D11'};margin-right:6px;vertical-align:middle"></span>`:'';
      const stHtml=`<div style="display:flex;align-items:center">${dotHtml}<span class="card-status-text ${(STATUSES[init.status]||STATUSES.implementacion).color}" style="font-size:8px">${(STATUSES[init.status]||STATUSES.implementacion).label}</span></div>`;
      tr.innerHTML=`<td class="plans-tbl-name">${init.title}</td><td class="plans-tbl-resp" style="min-width:100px">${stHtml}</td><td class="plans-tbl-resp">${respHtml}</td><td class="plans-tbl-plans">${planItems}</td>`;
      tbody.appendChild(tr);
    });
  });
  tbl.appendChild(tbody);container.appendChild(tbl);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closePlansModal();}});

// ── INIT ─────────────────────────────────────────────────────────────────────
function rebuildAll(){
  // Set all panels hidden via inline style
  document.querySelectorAll('.cat-panel').forEach(p=>{p.style.display='none';});
  // Show general panel
  document.getElementById('panelGeneral').style.display='block';
  buildTabs();
  buildGeneralPanel();
}
rebuildAll();
</script>
