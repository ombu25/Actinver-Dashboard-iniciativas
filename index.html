<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impacto de Iniciativas — Personas Físicas Patrimonial</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Open+Sans:wght@400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg-deep:#0A0E12;--bg-card:#141C2A;--bg-card-light:#1B2536;--azul:#314566;--line:rgba(255,255,255,0.07);--line-strong:rgba(255,255,255,0.13);--sunset:#E6C78A;--text-pri:#FFFFFF;--text-sec:rgba(255,255,255,0.60);--text-mut:rgba(255,255,255,0.34);--good:#5EE6A0;--bad:#FF8B8B;--warn:#FFC85C;--good-bg:rgba(94,230,160,0.10);--bad-bg:rgba(255,139,139,0.10);--warn-bg:rgba(255,200,92,0.10);}
html,body{background:var(--bg-deep);color:var(--text-pri);font-family:'Open Sans',sans-serif;min-height:100vh;font-size:13px;line-height:1.5;background-image:radial-gradient(ellipse 90% 50% at 50% 0%,rgba(49,69,102,0.18),transparent 65%),radial-gradient(ellipse 50% 70% at 95% 100%,rgba(49,69,102,0.09),transparent 60%);background-attachment:fixed;}
.shell{max-width:1380px;margin:0 auto;padding:24px 28px 80px}
@media(max-width:768px){.shell{padding:16px 14px 60px}}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:18px;border-bottom:1px solid var(--line-strong);flex-wrap:wrap;gap:14px;}
.title-eye{font-family:'Poppins',sans-serif;font-size:10px;font-weight:600;color:var(--text-mut);letter-spacing:3.5px;text-transform:uppercase;margin-bottom:6px;}
.title-main{font-family:'Poppins',sans-serif;font-size:26px;font-weight:300;color:var(--text-pri);letter-spacing:.3px;line-height:1.15;}
.title-main b{font-weight:700}
.header-logo{height:34px;width:auto;opacity:.95;flex-shrink:0}
@media(max-width:480px){.title-main{font-size:19px}.header-logo{height:26px}}
.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--bg-card);border:1px solid var(--line);border-radius:4px;padding:11px 16px;margin-bottom:30px;}
.ctrl-lbl{font-size:9px;font-weight:600;font-family:'Poppins',sans-serif;color:var(--text-mut);text-transform:uppercase;letter-spacing:2.5px;}
.tog{display:flex;background:var(--bg-deep);border:1px solid var(--line);border-radius:3px;padding:2px}
.tog-btn{padding:6px 14px;font-size:10px;font-family:'Poppins',sans-serif;font-weight:600;color:var(--text-mut);cursor:pointer;border-radius:2px;border:none;background:transparent;letter-spacing:1.5px;text-transform:uppercase;transition:all .18s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.tog-btn.on{background:var(--sunset);color:#0A0E12}
.tog-btn:hover:not(.on){color:var(--text-pri)}
.month-select{background:var(--bg-deep);border:1px solid var(--line);color:var(--text-pri);padding:6px 12px;border-radius:3px;font-family:'Open Sans',sans-serif;font-size:12px;cursor:pointer;font-weight:600;}
.month-select:focus{outline:none;border-color:var(--sunset)}
.month-select option{background:#1B2536}
/* RESUMEN BUTTON */
.resumen-btn{margin-left:auto;display:flex;align-items:center;gap:7px;padding:7px 16px;background:transparent;border:1px solid var(--sunset);border-radius:3px;color:var(--sunset);font-family:'Poppins',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .18s;}
.resumen-btn:hover{background:rgba(230,199,138,0.08)}
.resumen-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;}
/* STATUS */
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;border-radius:3px;}
.status-badge.green{color:var(--good);background:var(--good-bg);border:1px solid rgba(94,230,160,.18)}
.status-badge.yellow{color:var(--warn);background:var(--warn-bg);border:1px solid rgba(255,200,92,.18)}
.status-badge.red{color:var(--bad);background:var(--bad-bg);border:1px solid rgba(255,139,139,.18)}
.status-badge.gray{color:var(--text-sec);background:rgba(255,255,255,0.05);border:1px solid var(--line)}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.status-dot.green{background:var(--good)}.status-dot.yellow{background:var(--warn)}.status-dot.red{background:var(--bad)}.status-dot.gray{background:rgba(255,255,255,0.3)}
/* CAT DIVIDER */
.cat-divider{display:flex;align-items:center;gap:14px;padding:24px 0 14px;border-top:1px solid var(--line-strong);margin-top:10px;}
.cat-divider:first-child{border-top:none;padding-top:0;margin-top:0}
.cat-divider-title{font-family:'Poppins',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:3.5px;color:var(--sunset);white-space:nowrap;}
.cat-divider-line{flex:1;height:1px;background:var(--line)}
.cat-count{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text-mut);letter-spacing:1px;white-space:nowrap}
/* GRID / CARD */
.init-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:4px;}
@media(max-width:700px){.init-grid{grid-template-columns:1fr}}
.init-card{background:var(--bg-card);border:1px solid var(--line);border-radius:5px;overflow:hidden;position:relative;display:flex;flex-direction:column;}
.init-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--sunset) 0%,transparent 55%);}
.card-top{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.card-top-left{flex:1;min-width:0}
.card-title{font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;color:var(--text-pri);line-height:1.2;margin-bottom:6px;}
.kpi-list{padding:0 16px 12px;display:flex;flex-direction:column;gap:8px}
.kpi-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 12px;background:rgba(255,255,255,0.028);border-radius:3px;border:1px solid var(--line);}
.kpi-row-left{flex:1;min-width:0}.kpi-row-label{font-size:9px;color:var(--text-mut);text-transform:uppercase;letter-spacing:1.5px;font-family:'Poppins',sans-serif;font-weight:600;margin-bottom:4px;line-height:1.3;}
.kpi-row-val{font-size:22px;font-family:'Poppins',sans-serif;font-weight:300;color:var(--text-pri);line-height:1;letter-spacing:-.5px;}
.kpi-row-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-family:'JetBrains Mono',monospace;font-weight:600;padding:3px 7px;border-radius:2px;}
.kpi-delta.up{background:var(--good-bg);color:var(--good)}.kpi-delta.dn{background:var(--bad-bg);color:var(--bad)}.kpi-delta.fl{background:rgba(255,255,255,0.04);color:var(--text-mut)}
.meta-wrap{text-align:right}.meta-bar-bg{height:3px;width:72px;background:rgba(255,255,255,0.07);border-radius:2px;margin-top:3px}
.meta-bar-fill{height:3px;border-radius:2px;transition:width .4s}
.meta-bar-fill.g{background:var(--good)}.meta-bar-fill.y{background:var(--warn)}.meta-bar-fill.r{background:var(--bad)}
.meta-txt{font-size:9px;color:var(--text-mut);font-family:'JetBrains Mono',monospace}
.card-chart{padding:0 16px 12px}.chart-lbl{font-size:9px;color:var(--text-mut);font-family:'Poppins',sans-serif;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.chart-wrap{position:relative;height:130px}
.card-pending{padding:8px 16px 14px}
.pending-badge{display:inline-flex;align-items:center;gap:6px;font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--warn);background:var(--warn-bg);border:1px solid rgba(255,200,92,.18);padding:5px 12px;border-radius:3px;}
.release-badge{display:inline-flex;align-items:center;gap:6px;font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--good);background:var(--good-bg);border:1px solid rgba(94,230,160,.18);padding:5px 12px;border-radius:3px;}
.pending-note{margin-top:8px;font-size:11px;color:var(--text-sec);line-height:1.6}
.desc-toggle{width:100%;text-align:left;border:none;background:transparent;color:inherit;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--line);cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;font-family:'Poppins',sans-serif;font-size:9.5px;font-weight:600;color:var(--text-mut);letter-spacing:2px;text-transform:uppercase;transition:color .15s;margin-top:auto;}
.desc-toggle:hover{color:var(--text-sec)}.desc-chevron{font-size:9px;transition:transform .2s;flex-shrink:0}
.desc-body{display:none;padding:0 16px 16px;font-size:12px;color:var(--text-sec);line-height:1.7;}
.desc-body.open{display:block;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(5,8,12,0.92);
  z-index:9999;
  display:none;
  overflow-y:scroll;
  -webkit-overflow-scrolling:touch;
}
.modal-overlay.open{display:block;}
.modal-box{
  background:#141C2A;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;
  width:calc(100% - 32px);
  max-width:1100px;
  margin:24px auto 60px;
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px;border-bottom:1px solid rgba(255,255,255,0.13);
  border-radius:8px 8px 0 0;
  background:#141C2A;
}
.modal-title{font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--sunset);}
.modal-close{background:transparent;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);width:32px;height:32px;border-radius:3px;cursor:pointer;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;flex-shrink:0;}
.modal-close:hover{color:#fff;}
.modal-body{padding:0 22px 28px;}
.modal-period{font-size:10px;color:var(--text-mut);font-family:'JetBrains Mono',monospace;letter-spacing:1px;padding:14px 0 16px;}
@media(max-width:600px){.modal-body{padding:0 12px 20px}.modal-header{padding:14px;}}
/* TABLE */
.summary-table{width:100%;border-collapse:collapse;font-size:12px;}
.summary-table thead th{font-size:9px;font-family:'Poppins',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-mut);padding:10px 12px;text-align:left;border-bottom:1px solid var(--line-strong);white-space:nowrap;position:sticky;top:0;background:#0F1620;z-index:2;}
.summary-table thead th.th-num{text-align:right;}
.summary-table tbody tr{border-bottom:1px solid rgba(255,255,255,0.04);transition:background .12s;}
.summary-table tbody tr:hover{background:rgba(255,255,255,0.022)}
.summary-table tbody tr.kpi-first-row td{padding-top:12px;}
.summary-table tbody tr.kpi-last-row td{padding-bottom:12px;}
.tbl-cat td{padding:18px 12px 7px!important;border-top:1px solid var(--line-strong)!important;border-bottom:1px solid var(--line-strong)!important;color:var(--sunset);font-family:'Poppins',sans-serif;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;background:#0A0E12;}
.tbl-init-cell{font-family:'Poppins',sans-serif;font-weight:600;font-size:12.5px;color:var(--text-pri);padding:12px 12px 4px!important;vertical-align:top;}
.tbl-status-cell{padding:12px 12px 4px!important;vertical-align:top;}
.tbl-kpi-name-cell{font-size:10.5px;color:var(--text-sec);padding:4px 12px!important;vertical-align:middle;}
.tbl-kpi-name-cell.first{padding-top:12px!important;}
.tbl-kpi-name-cell.last{padding-bottom:12px!important;}
.tbl-val{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--text-mut);padding:4px 12px!important;text-align:right;vertical-align:middle;white-space:nowrap;}
.tbl-val.first{padding-top:12px!important;}.tbl-val.last{padding-bottom:12px!important;}
.tbl-val.cur{color:var(--text-pri);}
.tbl-delta-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:4px 12px!important;text-align:right;vertical-align:middle;white-space:nowrap;}
.tbl-delta-num.first{padding-top:12px!important;}.tbl-delta-num.last{padding-bottom:12px!important;}
.tbl-delta-num.up{color:var(--good)}.tbl-delta-num.dn{color:var(--bad)}.tbl-delta-num.fl{color:var(--text-mut)}
.tbl-delta-pct{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:600;padding:4px 12px!important;text-align:right;vertical-align:middle;white-space:nowrap;}
.tbl-delta-pct.first{padding-top:12px!important;}.tbl-delta-pct.last{padding-bottom:12px!important;}
.tbl-pct-badge{display:inline-block;padding:2px 7px;border-radius:2px;}
.tbl-pct-badge.up{background:var(--good-bg);color:var(--good)}.tbl-pct-badge.dn{background:var(--bad-bg);color:var(--bad)}.tbl-pct-badge.fl{color:var(--text-mut)}
.tbl-no-kpi-row td{padding:10px 12px!important;font-size:11px;color:var(--text-mut);font-style:italic;}
.tbl-init-spacer{height:0;border:none!important;background:transparent!important;}
@media(max-width:600px){.modal-body{padding:0 12px 16px}.tbl-kpi-name-cell{font-size:9.5px}}
</style>
</head>

      <div class="title-eye">Uso interno · Growth · Mayo 2026</div>

    </svg>
  </div>

  <div class="controls">
    <span class="ctrl-lbl">Datos</span>
    <div class="tog">
      <button class="tog-btn on" id="btnMvM" onclick="setDataView('mvm')" type="button">Mes vs Mes</button>
      <button class="tog-btn" id="btnAcum" onclick="setDataView('acum')" type="button">Acumulado</button>
    </div>
    <div id="monthWrap" style="display:flex;align-items:center;gap:8px">
      <span class="ctrl-lbl">Mes</span>
      <select class="month-select" id="monthSel" onchange="setMonth(this.value)">
        <option value="1">Noviembre</option><option value="2">Diciembre</option>
        <option value="3">Enero</option><option value="4">Febrero</option>
        <option value="5">Marzo</option><option value="6" selected>Abril</option>
      </select>
    </div>
    <button class="resumen-btn" onclick="openModal()" type="button">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Ver Resumen
    </button>
  </div>

  <div id="main-content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">Resumen General · Todas las Iniciativas</span>
      <button class="modal-close" onclick="closeModal()" type="button">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-period" id="modalPeriod"></div>
      <div id="modal-table-content"></div>
    </div>
  </div>
</div>

<script>
let dataView='mvm',monthIdx=5;
const MONTH_LABELS=['Nov','Dic','Ene','Feb','Mar','Abr'];
const MONTH_NAMES=['Noviembre','Diciembre','Enero','Febrero','Marzo','Abril'];
const charts={};
const STATUSES={seguimiento:{label:'Seguimiento de resultados',color:'green'},reciente:{label:'Lanzamiento reciente',color:'yellow'},implementacion:{label:'En proceso de implementación',color:'gray'}};
function randomStatus(){const keys=Object.keys(STATUSES);return keys[Math.floor(Math.random()*keys.length)];}
function mkSeries(base,vol,growth,n=6){let v=base,arr=[];for(let i=0;i<n;i++){v=v*(1+growth)+(Math.random()-0.44)*vol*base;arr.push(Math.round(v*10)/10);}return arr;}

const CATEGORIES=[
  {id:'clientes',title:'Clientes',items:[
    {id:'granfiltro',title:'Gran Filtro',status:randomStatus(),desc:'El Gran Filtro es el proceso de calificación y prospección de clientes potenciales de alto valor patrimonial. Busca identificar leads de calidad mediante criterios financieros y de perfil de riesgo, para convertirlos en clientes activos de Actinver Patrimonial.',kpis:[{label:'SQLs generados',data:mkSeries(380,0.12,0.06),meta:500,fmt:n=>Math.round(n).toLocaleString('es-MX')},{label:'Conversión SQL→cliente',data:mkSeries(11,0.15,0.03),meta:15,fmt:n=>n.toFixed(1)+'%'},{label:'AUM promedio cliente nuevo',data:mkSeries(290,0.08,0.04),meta:350,fmt:n=>'$'+Math.round(n)+'K'}]},
    {id:'onboarding',title:'Onboarding Digital',status:randomStatus(),desc:'Proceso de apertura de cuenta 100% digital. Reduce el tiempo de activación a menos de 24 horas.',kpis:[{label:'Conversión apertura',data:mkSeries(52,0.10,0.025),meta:60,fmt:n=>n.toFixed(1)+'%'},{label:'Conversión fondeo',data:mkSeries(61,0.09,0.02),meta:70,fmt:n=>n.toFixed(1)+'%'},{label:'Saldo prom. cliente nuevo',data:mkSeries(145,0.10,0.04),meta:180,fmt:n=>'$'+Math.round(n)+'K'}]},
    {id:'ovirtual',title:'Oficina Virtual',status:randomStatus(),desc:'Canal digital de atención personalizada. Los clientes interactúan con su asesor y realizan operaciones desde cualquier dispositivo.',kpis:[{label:'Clientes activos en OV',data:mkSeries(1450,0.06,0.03),meta:2000,fmt:n=>Math.round(n).toLocaleString('es-MX')},{label:'Nuevos / migrados al mes',data:mkSeries(140,0.12,0.04),meta:200,fmt:n=>Math.round(n)}]},
    {id:'liverpool',title:'Liverpool (Activa)',status:randomStatus(),desc:'Alianza con Liverpool para captar clientes patrimoniales en puntos de venta físicos de alto poder adquisitivo.',kpis:[{label:'Clientes nuevos',data:mkSeries(105,0.10,0.05),meta:150,fmt:n=>Math.round(n)},{label:'AUM total captado',data:mkSeries(17,0.10,0.05),meta:25,fmt:n=>'$'+n.toFixed(1)+'M'}]},
    {id:'dinn',title:'DINN',status:randomStatus(),desc:'Plataforma digital nativa para captar inversores jóvenes con productos que evolucionan hacia perfiles patrimoniales.',kpis:[{label:'Clientes nuevos',data:mkSeries(155,0.10,0.04),meta:200,fmt:n=>Math.round(n)},{label:'AUM total captado',data:mkSeries(22,0.09,0.04),meta:30,fmt:n=>'$'+n.toFixed(1)+'M'}]},
    {id:'bancapartner',title:'Banca Partner',status:'implementacion',desc:'Modelo B2B2C con empresas socias. En fase de definición de KPIs y estructura comercial.',kpis:[{label:'Clientes nuevos',data:mkSeries(80,0.15,0.05),meta:null,fmt:n=>Math.round(n)},{label:'AUM total',data:mkSeries(12,0.15,0.05),meta:null,fmt:n=>'$'+n.toFixed(1)+'M'}]},
  ]},
  {id:'captacion',title:'Captación de Activos',items:[
    {id:'sprintcap',title:'Sprint de Captación',status:randomStatus(),desc:'Campaña intensiva por sprints para maximizar flujos netos de fondos en ventanas cortas de tiempo.',kpis:[{label:'NNF (Nuevos Netos de Fondos)',data:mkSeries(68,0.15,0.06),meta:100,fmt:n=>'$'+n.toFixed(0)+'M'},{label:'NNA chequeras',data:mkSeries(210,0.12,0.05),meta:300,fmt:n=>Math.round(n)},{label:'NNA pagaré',data:mkSeries(95,0.14,0.04),meta:150,fmt:n=>Math.round(n)}]},
    {id:'ctaremunerada',title:'Cuenta Remunerada',status:'implementacion',noKpis:true,pendingNote:'Iniciativa en etapa de planeación. Fecha estimada de plan de trabajo: por confirmar. Sin fecha de liberación definida.',desc:'Producto de captación con rendimientos competitivos sobre saldos en cuenta de cheques.'},
    {id:'pagare',title:'Pagaré Digital',status:'implementacion',noKpis:true,releaseNote:'Liberación a producción confirmada: 21 de mayo 2026 — App y Web. En tiempo para liberar.',desc:'Digitalización completa del proceso de contratación de pagarés, sin necesidad de acudir a sucursal.'},
  ]},
  {id:'vinculacion',title:'Vinculación de Productos',items:[
    {id:'creditovalor',title:'Crédito Valor Digital',status:randomStatus(),desc:'Créditos respaldados por el portafolio del cliente sin liquidar inversiones, todo de forma digital.',kpis:[{label:'% créditos canal digital',data:mkSeries(58,0.10,0.03),meta:70,fmt:n=>n.toFixed(1)+'%'},{label:'Cartera nueva',data:mkSeries(58,0.10,0.05),meta:80,fmt:n=>'$'+n.toFixed(0)+'M'},{label:'Crédito promedio',data:mkSeries(420,0.08,0.02),meta:500,fmt:n=>'$'+Math.round(n)+'K'}]},
    {id:'seguros',title:'Seguros Dotales',status:randomStatus(),desc:'Seguros de vida dotales como producto complementario al portafolio de inversiones patrimoniales.',kpis:[{label:'Pólizas colocadas',data:mkSeries(58,0.12,0.04),meta:80,fmt:n=>Math.round(n)},{label:'Primas pagadas',data:mkSeries(2.8,0.12,0.04),meta:4,fmt:n=>'$'+n.toFixed(1)+'M'}]},
    {id:'divisaflex',title:'Divisa Flex',status:randomStatus(),desc:'Tarjeta con conversión automática de divisas para clientes con perfil global.',kpis:[{label:'Tarjetas colocadas',data:mkSeries(360,0.10,0.05),meta:500,fmt:n=>Math.round(n)},{label:'Tarjetas activas',data:mkSeries(62,0.08,0.02),meta:70,fmt:n=>n.toFixed(1)+'%'},{label:'Monto fondeado',data:mkSeries(10,0.10,0.05),meta:15,fmt:n=>'$'+n.toFixed(1)+'M'}]},
  ]},
  {id:'transaccional',title:'Transaccionalidad',items:[
    {id:'bancaelec',title:'Banca Electrónica',status:randomStatus(),desc:'Plataforma digital de operaciones bancarias integrales desde web y app móvil.',kpis:[{label:'Usuarios activos mensuales',data:mkSeries(3800,0.06,0.04),meta:5000,fmt:n=>Math.round(n).toLocaleString('es-MX')},{label:'Usuarios transaccionales',data:mkSeries(57,0.07,0.02),meta:60,fmt:n=>n.toFixed(1)+'%'}]},
    {id:'spei',title:'SPEI Inmediato',status:randomStatus(),desc:'Transferencias SPEI 24/7 en tiempo real desde la plataforma digital.',kpis:[{label:'% SPEIs canal digital',data:mkSeries(76,0.06,0.02),meta:85,fmt:n=>n.toFixed(1)+'%'},{label:'Operaciones digitales al mes',data:mkSeries(7200,0.10,0.05),meta:10000,fmt:n=>Math.round(n).toLocaleString('es-MX')}]},
  ]},
  {id:'lab',title:'Laboratorio de Pruebas',items:[
    {id:'julioverne',title:'Julio Verne',status:randomStatus(),desc:'Iniciativa experimental para explorar nuevos modelos de vinculación con clientes patrimoniales jóvenes mediante experiencias financieras innovadoras.',kpis:[{label:'Membresías pagadas',data:mkSeries(340,0.10,0.05),meta:500,fmt:n=>Math.round(n)},{label:'Monto cobrado',data:mkSeries(510,0.10,0.05),meta:750,fmt:n=>'$'+Math.round(n)+'K'},{label:'Utilidad vs sin membresía',data:mkSeries(18,0.10,0.04),meta:25,fmt:n=>'+'+n.toFixed(1)+'%'}]},
    {id:'sonata',title:'Sonata',status:'implementacion',noKpis:true,pendingNote:'Iniciativa en etapa de planeación. Fecha estimada de liberación: 1 de julio 2026.',desc:'Proyecto en planeación dentro del laboratorio de pruebas para nuevos esquemas de producto patrimonial. Liberación estimada el 1 de julio de 2026.'},
  ]},
];

function setDataView(v){dataView=v;document.getElementById('btnMvM').classList.toggle('on',v==='mvm');document.getElementById('btnAcum').classList.toggle('on',v==='acum');document.getElementById('monthWrap').style.display=v==='mvm'?'flex':'none';rebuildAll();}
function setMonth(val){monthIdx=parseInt(val)-1;rebuildAll();}
function openModal(){
  document.getElementById('modalOverlay').classList.add('open');
  buildModalTable();
  document.getElementById('modalOverlay').scrollTop = 0;
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function fmtDelta(prev,cur){if(prev==null||prev===0)return{str:'—',cls:'fl'};const p=((cur-prev)/Math.abs(prev))*100;return{str:(p>=0?'+':'')+p.toFixed(1)+'%',cls:p>0.5?'up':p<-0.5?'dn':'fl'};}
function metaColor(pct){if(pct>=85)return'g';if(pct>=60)return'y';return'r';}
function getVal(kpi){if(dataView==='mvm')return kpi.data[monthIdx];return kpi.data.slice(0,monthIdx+1).reduce((a,b)=>a+b,0);}
function getPrev(kpi){if(dataView==='mvm'){return monthIdx===0?null:kpi.data[monthIdx-1];}if(monthIdx===0)return null;return kpi.data.slice(0,monthIdx).reduce((a,b)=>a+b,0);}
function getChartData(kpi){if(dataView==='mvm')return kpi.data.slice(0,monthIdx+1);let cum=0,arr=[];kpi.data.slice(0,monthIdx+1).forEach(v=>{cum+=v;arr.push(Math.round(cum*10)/10)});return arr;}
function statusBadgeHtml(status){const s=STATUSES[status]||STATUSES.implementacion;return`<div class="status-badge ${s.color}"><span class="status-dot ${s.color}"></span>${s.label}</div>`;}

function buildCard(init){
  const el=document.createElement('div');el.className='init-card';el.id='card-'+init.id;
  let kpiHtml='';
  if(!init.noKpis&&init.kpis&&init.kpis.length){init.kpis.forEach(k=>{const val=getVal(k),prev=getPrev(k),d=fmtDelta(prev,val),pct=k.meta?Math.min(Math.round((val/k.meta)*100),100):null,mc=pct!=null?metaColor(pct):null;kpiHtml+=`<div class="kpi-row"><div class="kpi-row-left"><div class="kpi-row-label">${k.label}</div><div class="kpi-row-val">${k.fmt(val)}</div></div><div class="kpi-row-right"><div class="kpi-delta ${d.cls}">${d.cls==='up'?'▲':d.cls==='dn'?'▼':'—'} ${d.str}</div>${pct!=null?`<div class="meta-wrap"><div class="meta-txt">Meta: ${k.fmt(k.meta)} · ${pct}%</div><div class="meta-bar-bg"><div class="meta-bar-fill ${mc}" style="width:${pct}%"></div></div></div>`:''}</div></div>`;});}
  let pendingHtml='';
  if(init.noKpis){if(init.pendingNote)pendingHtml=`<div class="card-pending"><div class="pending-badge">Sin KPIs definidos</div><div class="pending-note">${init.pendingNote}</div></div>`;else if(init.releaseNote)pendingHtml=`<div class="card-pending"><div class="release-badge">En tiempo · Liberación confirmada</div><div class="pending-note">${init.releaseNote}</div></div>`;}
  let chartHtml='';
  if(!init.noKpis&&init.kpis&&init.kpis.length){const lbl=dataView==='mvm'?`Tendencia mensual · hasta ${MONTH_NAMES[monthIdx]}`:`Acumulado · hasta ${MONTH_NAMES[monthIdx]}`;chartHtml=`<div class="card-chart"><div class="chart-lbl">${lbl}</div><div class="chart-wrap"><canvas id="chart-${init.id}"></canvas></div></div>`;}
  el.innerHTML=`<div class="card-top"><div class="card-top-left"><div class="card-title">${init.title}</div></div><div style="flex-shrink:0">${statusBadgeHtml(init.status)}</div></div>${init.noKpis?pendingHtml:`<div class="kpi-list">${kpiHtml}</div>`}${chartHtml}<button class="desc-toggle" type="button" onclick="toggleDesc('${init.id}')"><span>Descripción de la iniciativa</span><span class="desc-chevron" id="chev-${init.id}">▼</span></button><div class="desc-body" id="desc-${init.id}">${init.desc||''}</div>`;
  return el;
}
function toggleDesc(id){const body=document.getElementById('desc-'+id),chev=document.getElementById('chev-'+id),open=body.classList.toggle('open');chev.style.transform=open?'rotate(180deg)':'';}
function renderChart(init){if(init.noKpis||!init.kpis||!init.kpis.length)return;const cid=init.id;if(charts[cid]){charts[cid].destroy();delete charts[cid];}const ctx=document.getElementById('chart-'+cid);if(!ctx)return;const labels=MONTH_LABELS.slice(0,monthIdx+1),colors=['#E6C78A','#5EE6A0','#7B9FD4'];const datasets=init.kpis.map((k,i)=>({label:k.label,data:getChartData(k),borderColor:colors[i]||colors[0],backgroundColor:(colors[i]||colors[0])+'14',borderWidth:i===0?2:1.5,pointRadius:3,pointHoverRadius:6,pointBackgroundColor:colors[i]||colors[0],pointBorderColor:'#0A0E12',pointBorderWidth:2,fill:i===0,tension:0.35}));if(init.kpis[0].meta){const mv=dataView==='acum'?init.kpis[0].meta*(monthIdx+1):init.kpis[0].meta;datasets.push({label:'Meta',data:Array(labels.length).fill(mv),borderColor:'rgba(255,255,255,0.16)',borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false,tension:0});}charts[cid]=new Chart(ctx,{type:'line',data:{labels,datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:init.kpis.length>1,position:'bottom',labels:{color:'rgba(255,255,255,0.38)',font:{size:9,family:'Open Sans'},padding:10,boxWidth:8}},tooltip:{backgroundColor:'#0A0E12',borderColor:'#314566',borderWidth:1,titleColor:'#fff',bodyColor:'rgba(255,255,255,0.65)',padding:9,callbacks:{label:ctx=>{const ki=init.kpis[ctx.datasetIndex];return`  ${ctx.dataset.label}: ${ki?ki.fmt(ctx.parsed.y):ctx.parsed.y}`}}}},scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(255,255,255,0.28)',font:{size:9}},border:{color:'transparent'}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'rgba(255,255,255,0.28)',font:{size:9}},border:{color:'transparent'}}}}});}

function buildModalTable(){
  const prevName = monthIdx>0 ? MONTH_NAMES[monthIdx-1] : '—';
  const curName  = MONTH_NAMES[monthIdx];
  const periodLbl = dataView==='mvm'
    ? `Mes vs Mes · ${curName} vs ${prevName}`
    : `Acumulado · hasta ${curName}`;
  document.getElementById('modalPeriod').textContent = periodLbl;

  const container = document.getElementById('modal-table-content');
  container.innerHTML = '';
  const tbl = document.createElement('table');
  tbl.className = 'summary-table';
  tbl.innerHTML = `<thead><tr>
    <th style="min-width:130px">Iniciativa</th>
    <th>Estatus</th>
    <th>KPI</th>
    <th class="th-num">${prevName}</th>
    <th class="th-num">${curName}</th>
    <th class="th-num">Δ Número</th>
    <th class="th-num">Δ %</th>
  </tr></thead>`;

  const tbody = document.createElement('tbody');

  CATEGORIES.forEach(cat => {
    // Category header row
    const catRow = document.createElement('tr');
    catRow.className = 'tbl-cat';
    catRow.innerHTML = `<td colspan="7">${cat.title}</td>`;
    tbody.appendChild(catRow);

    cat.items.forEach(init => {
      if (init.noKpis) {
        // Single row for no-KPI initiatives
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="tbl-init-cell">${init.title}</td>
          <td class="tbl-status-cell">${statusBadgeHtml(init.status)}</td>
          <td colspan="5" style="padding:10px 12px;font-size:11px;color:var(--text-mut);font-style:italic">
            ${init.pendingNote || init.releaseNote || 'Sin KPIs definidos'}
          </td>`;
        tbody.appendChild(tr);
        return;
      }

      // One row per KPI — initiative name spans all KPI rows
      init.kpis.forEach((k, ki) => {
        const isFirst = ki === 0;
        const isLast  = ki === init.kpis.length - 1;
        const fc = isFirst ? ' first' : '';
        const lc = isLast  ? ' last'  : '';

        const val    = getVal(k);
        const prev   = getPrev(k);
        const deltaN = prev != null ? val - prev : null;
        const deltaP = (prev != null && prev !== 0) ? ((val - prev) / Math.abs(prev)) * 100 : null;
        const cls    = deltaN == null ? 'fl' : deltaN > 0.0001 ? 'up' : deltaN < -0.0001 ? 'dn' : 'fl';
        const arrow  = cls === 'up' ? '▲ ' : cls === 'dn' ? '▼ ' : '';

        const fmtDeltaNum = (dn) => {
          if (dn == null) return '—';
          const sign = dn >= 0 ? '+' : '-';
          const raw  = String(k.fmt(Math.abs(dn)));
          if (raw.startsWith('$')) return '$' + sign.replace('+','') + raw.slice(1);
          return sign + raw.replace(/^\+/,'');
        };

        const tr = document.createElement('tr');

        if (isFirst) {
          const tdInit = document.createElement('td');
          tdInit.className = 'tbl-init-cell';
          tdInit.rowSpan = init.kpis.length;
          tdInit.style.cssText = 'vertical-align:top;border-right:1px solid rgba(255,255,255,0.07)';
          tdInit.textContent = init.title;
          tr.appendChild(tdInit);

          const tdStatus = document.createElement('td');
          tdStatus.className = 'tbl-status-cell';
          tdStatus.rowSpan = init.kpis.length;
          tdStatus.style.cssText = 'vertical-align:top;border-right:1px solid rgba(255,255,255,0.07)';
          tdStatus.innerHTML = statusBadgeHtml(init.status);
          tr.appendChild(tdStatus);
        }

        const tdName = document.createElement('td');
        tdName.className = `tbl-kpi-name-cell${fc}${lc}`;
        tdName.textContent = k.label;
        tr.appendChild(tdName);

        const tdPrev = document.createElement('td');
        tdPrev.className = `tbl-val${fc}${lc}`;
        tdPrev.textContent = prev != null ? k.fmt(prev) : '—';
        tr.appendChild(tdPrev);

        const tdCur = document.createElement('td');
        tdCur.className = `tbl-val cur${fc}${lc}`;
        tdCur.textContent = k.fmt(val);
        tr.appendChild(tdCur);

        const tdDeltaN = document.createElement('td');
        tdDeltaN.className = `tbl-delta-num ${cls}${fc}${lc}`;
        tdDeltaN.textContent = deltaN != null ? arrow + fmtDeltaNum(deltaN) : '—';
        tr.appendChild(tdDeltaN);

        const tdDeltaP = document.createElement('td');
        tdDeltaP.className = `tbl-delta-pct${fc}${lc}`;
        const badge = document.createElement('span');
        badge.className = `tbl-pct-badge ${cls}`;
        badge.textContent = deltaP != null ? (deltaP >= 0 ? '+' : '') + deltaP.toFixed(1) + '%' : '—';
        tdDeltaP.appendChild(badge);
        tr.appendChild(tdDeltaP);

        tbody.appendChild(tr);
      });
    });
  });

  tbl.appendChild(tbody);
  container.appendChild(tbl);
}
function rebuildAll(){Object.keys(charts).forEach(id=>{if(charts[id]){charts[id].destroy();delete charts[id];}});const container=document.getElementById('main-content');container.innerHTML='';CATEGORIES.forEach(cat=>{const div=document.createElement('div');div.className='cat-divider';div.innerHTML=`<span class="cat-divider-title">${cat.title}</span><span class="cat-divider-line"></span><span class="cat-count">${cat.items.length} iniciativa${cat.items.length!==1?'s':''}</span>`;container.appendChild(div);const grid=document.createElement('div');grid.className='init-grid';cat.items.forEach(init=>grid.appendChild(buildCard(init)));container.appendChild(grid);});requestAnimationFrame(()=>{CATEGORIES.forEach(cat=>cat.items.forEach(init=>{if(!init.noKpis)renderChart(init);}));});}
rebuildAll();
</script>
</body>
</html>
